<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAYSLIP ENGINE — SALARY COMPUTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: rgba(255, 255, 255, 0.03);
            --primary: #22c55e;
            --text-main: #f1f5f9;
            --glass: rgba(255, 255, 255, 0.08);
            --border-glass: rgba(255, 255, 255, 0.12);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px 10px 120px 10px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .engine-container {
            width: 100%;
            max-width: 600px;
            background: var(--surface);
            backdrop-filter: blur(25px);
            padding: 24px;
            border-radius: 24px;
            border: 1px solid var(--border-glass);
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        }

        .top-nav-deck { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .nav-btn { background: var(--glass); border: 1px solid var(--border-glass); color: var(--text-main); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        
        h1 { font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.12em; margin: 0; }

        .profile-badge-deck { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-glass); border-radius: 16px; padding: 16px; margin-bottom: 24px; }
        .profile-meta-row { display: flex; justify-content: space-between; font-size: 0.75rem; padding: 4px 0; }
        .lbl { color: #94a3b8; font-weight: 700; text-transform: uppercase; font-size: 0.65rem; }
        .val { color: #f1f5f9; font-weight: 600; }

        .form-block { margin-bottom: 20px; }
        .form-block label { display: block; font-size: 0.7rem; color: #94a3b8; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; }
        select, input { width: 100%; background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border-glass); padding: 14px; border-radius: 14px; color: white; font-weight: 600; outline: none; box-sizing: border-box; }
        
        .calendar-deck { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .calendar-day-node { background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass); border-radius: 8px; padding: 8px 2px; text-align: center; cursor: pointer; }
        .day-num { font-size: 0.9rem; font-weight: 800; display: block; }
        .day-lbl { font-size: 0.5rem; color: #64748b; }

        .scannable-table-wrapper { width: 100%; overflow-x: auto; background: rgba(0,0,0,0.2); border-radius: 14px; padding: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7rem; }
        th { text-align: left; padding: 8px; border-bottom: 1px solid var(--border-glass); color: #94a3b8; }
        td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .net-pay-display-deck { background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-glass); border-radius: 16px; padding: 20px; text-align: center; margin-top: 20px; }
        .val-stream { font-size: 2rem; font-weight: 900; color: var(--primary); }
        
        .engine-btn { width: 100%; background: var(--glass); border: 1px solid var(--border-glass); color: white; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; margin-top: 10px; }
        .primary-btn { background: var(--primary); color: #000; border: none; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(5, 7, 12, 0.85); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-box { background: #111625; border: 1px solid var(--border-glass); width: 90%; max-width: 420px; border-radius: 20px; padding: 22px; }
        .clear-btn { background: #ef4444; color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="engine-container">
        <div class="top-nav-deck">
            <button class="nav-btn"><i data-lucide="arrow-left"></i></button>
            <h1>TIME & PAYSLIP</h1>
            <div style="width:40px;"></div>
        </div>

        <div class="profile-badge-deck">
            <div class="profile-meta-row"><span class="lbl">NAME</span><span class="val" id="profNameDisplay">-</span></div>
            <div class="profile-meta-row"><span class="lbl">POSITION</span><span class="val" id="profPosDisplay">-</span></div>
            <div class="profile-meta-row"><span class="lbl">DEPARTMENT</span><span class="val" id="profDeptDisplay">-</span></div>
        </div>

        <div class="form-block">
            <label>PERIOD CLOSURE</label>
            <select id="periodSelector" onchange="processPeriodEngineChange()"></select>
        </div>

        <div class="form-block">
            <label>DUTY TRANSACTION (CLICK DATE)</label>
            <div class="calendar-deck" id="calendarNodeGrid"></div>
        </div>

        <div class="form-block">
            <label>STATUTORY & DEDUCTION INPUTS</label>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;">
                <input type="number" id="inputSSS" placeholder="SSS" oninput="recomputeGlobalFinancials()">
                <input type="number" id="inputPHIC" placeholder="PHIC" oninput="recomputeGlobalFinancials()">
                <input type="number" id="inputHDMF" placeholder="HDMF" oninput="recomputeGlobalFinancials()">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px;">
                <input type="number" id="inputAdvances" placeholder="ADVANCES" oninput="recomputeGlobalFinancials()">
                <input type="number" id="inputReimbursements" placeholder="REIMBURSEMENTS" oninput="recomputeGlobalFinancials()">
            </div>
        </div>

        <div class="scannable-table-wrapper">
            <table id="uiDailyBreakdownTable">
                <thead>
                    <tr>
                        <th>DATE</th><th>DAY</th><th>IN/OUT(AM)</th><th>IN/OUT(PM)</th><th>OT</th><th>LATE/UT</th><th>GROSS</th><th>DED.</th><th>NET</th>
                    </tr>
                </thead>
                <tbody id="uiDailyBreakdownBody"></tbody>
            </table>
        </div>

        <div class="net-pay-display-deck">
            <div class="lbl">NET DISBURSABLE PAYOUT</div>
            <div class="val-stream" id="breakdownNet">₱0.00</div>
        </div>

        <button class="engine-btn primary-btn" onclick="commitTimelineTransactionToCloud()">SAVE ENGINE TRANSACTIONS</button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <button class="engine-btn" onclick="window.print()">PRINT</button>
            <button class="engine-btn" onclick="triggerCSVExportPipeline()">EXPORT CSV</button>
        </div>
    </div>

    <div class="modal-overlay" id="timeConfigModalOverlay">
        <div class="modal-box">
            <h3 id="modalTargetDateHeader">LOG TRANSACTION</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <input type="time" id="modalTimeIn1">
                <input type="time" id="modalTimeOut1">
                <input type="time" id="modalTimeIn2">
                <input type="time" id="modalTimeOut2">
            </div>
            <label style="margin-top:10px;"><input type="checkbox" id="chkEnableMidDay"> ENABLE MID-DAY BREAK (AUTO 12:00 OUT)</label>
            <label><input type="checkbox" id="chkEnableOT"> APPLY OVERTIME</label>
            <button class="engine-btn primary-btn" onclick="commitModalDayStateToLocalBuffer()">APPLY</button>
            <button class="clear-btn" onclick="clearDayRecord()">CLEAR RECORD</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaeNQF4qmW0vvwxUPp_NztnT0hoLzm1BQ",
            projectId: "svls-289ee"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const userId = localStorage.getItem("userId") || "test_user_id";

        let timelineBuffer = {};
        let activeDatesArray = [];
        let currentTargetDateString = "";
        let salarySettings = { dailyRate: 460, timeIn: "08:00", timeOut: "17:00", position: "Staff", department: "Operations" };

        async function bootEngineCore() {
            const settingsSnap = await getDoc(doc(db, "salary_settings", userId));
            if (settingsSnap.exists()) {
                salarySettings = settingsSnap.data();
                document.documentElement.style.setProperty('--primary', salarySettings.btnValue || '#22c55e');
                document.documentElement.style.setProperty('--bg', salarySettings.bgValue || '#0b0f1a');
            }
            document.getElementById('profNameDisplay').innerText = (salarySettings.firstName || "USER").toUpperCase();
            document.getElementById('profPosDisplay').innerText = (salarySettings.position || "STAFF").toUpperCase();
            document.getElementById('profDeptDisplay').innerText = (salarySettings.department || "OPS").toUpperCase();
            
            buildDropdownTargetIntervals();
            processPeriodEngineChange();
        }

        function buildDropdownTargetIntervals() {
            const selector = document.getElementById('periodSelector');
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            months.forEach((m, i) => {
                selector.innerHTML += `<option value="2026-${i+1}-15">${m} 15, 2026</option>`;
                selector.innerHTML += `<option value="2026-${i+1}-30">${m} 30, 2026</option>`;
            });
        }

        window.processPeriodEngineChange = () => {
            const [y, m, d] = document.getElementById('periodSelector').value.split('-');
            activeDatesArray = [];
            let date = new Date(y, m-1, 1);
            while(date.getMonth() == m-1) { activeDatesArray.push(new Date(date)); date.setDate(date.getDate()+1); }
            renderActivePeriodCalendarGrid();
            recomputeGlobalFinancials();
        };

        function renderActivePeriodCalendarGrid() {
            const grid = document.getElementById('calendarNodeGrid');
            grid.innerHTML = "";
            activeDatesArray.forEach(date => {
                const key = date.toISOString().split('T')[0];
                const cell = document.createElement('div');
                cell.className = "calendar-day-node";
                cell.innerHTML = `<span class="day-num">${date.getDate()}</span><span class="day-lbl">${date.toLocaleDateString('en-US',{weekday:'short'})}</span>`;
                if(timelineBuffer[key]) cell.style.background = 'var(--primary)';
                cell.onclick = () => launchTimeTransactionModal(key);
                grid.appendChild(cell);
            });
        }

        window.launchTimeTransactionModal = (key) => {
            currentTargetDateString = key;
            document.getElementById('timeConfigModalOverlay').classList.add('active');
        };

        window.clearDayRecord = () => {
            delete timelineBuffer[currentTargetDateString];
            document.getElementById('timeConfigModalOverlay').classList.remove('active');
            renderActivePeriodCalendarGrid();
            recomputeGlobalFinancials();
        };

        window.commitModalDayStateToLocalBuffer = () => {
            timelineBuffer[currentTargetDateString] = {
                in1: document.getElementById('modalTimeIn1').value,
                out1: document.getElementById('modalTimeOut1').value,
                midDay: document.getElementById('chkEnableMidDay').checked
            };
            document.getElementById('timeConfigModalOverlay').classList.remove('active');
            renderActivePeriodCalendarGrid();
            recomputeGlobalFinancials();
        };

        window.recomputeGlobalFinancials = () => {
            let tbody = document.getElementById('uiDailyBreakdownBody');
            tbody.innerHTML = "";
            let net = 0;
            activeDatesArray.forEach(d => {
                const key = d.toISOString().split('T')[0];
                const rec = timelineBuffer[key];
                if(rec) {
                    tbody.innerHTML += `<tr><td>${d.getDate()}</td><td>-</td><td>${rec.in1}</td><td>${rec.out1}</td><td>-</td><td>0</td><td>460</td><td>0</td><td>460</td></tr>`;
                    net += 460;
                }
            });
            document.getElementById('breakdownNet').innerText = `₱${net.toFixed(2)}`;
        };

        window.commitTimelineTransactionToCloud = async () => {
            await setDoc(doc(db, "salary_transactions", `${userId}_current`), { timelineBuffer });
            alert("SAVED.");
        };

        window.onload = bootEngineCore;
    </script>
</body>
</html>
