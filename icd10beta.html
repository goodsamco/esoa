<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSOA - Full Orange Edition (Beta)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Poppins:wght@400;600;800&family=Roboto+Mono:wght@400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="esoa.css">
    <link rel="stylesheet" href="registry.css">
</head>
<body onmouseleave="if(typeof resetMagnet === 'function') resetMagnet()">

    <div class="peer-wrapper-row">
        <button class="scroll-nav-btn prev" title="Scroll Left"><i data-lucide="chevron-left"></i></button>
        <div class="peer-active-hub" id="peerActiveHub"></div>
        <button class="scroll-nav-btn next" title="Scroll Right"><i data-lucide="chevron-right"></i></button>
    </div>

    <div class="top-nav">
        <button class="top-btn" title="Reset" id="globalResetTrigger"><i data-lucide="refresh-cw"></i></button> 
        <button class="top-btn" title="Senior Discount" id="srModalTrigger"><i data-lucide="user-check"></i></button>
        
        <button class="top-btn" id="nav-esoa" title="eSOA"><i data-lucide="receipt"></i></button>
        <button class="top-btn active" id="nav-icd10" title="ICD10 Codes"><i data-lucide="stethoscope"></i></button>
        <button class="top-btn" id="nav-cf4" title="CF4 Form"><i data-lucide="credit-card"></i></button>
    </div>

    <img id="userDisplayAvatar" class="profile-avatar-node" src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix" alt="User Avatar">
    <span id="userDisplayName" class="name-string">Name</span>

    <div class="container" id="mainContainer">
        <div id="highlighter"></div>

        <div class="search-priority-view" id="prioritySearchView">
            <h3>Top Search Matches</h3>
            <div id="searchResultTargetGroup"></div>
        </div>

        <div class="category-header" id="icdHeader">
            <h2>ICD-10 Diagnostic Codes</h2>
            <i data-lucide="chevron-down" class="chevron-icon"></i>
        </div>
        <div class="section-group-wrapper" id="icd-wrapper">
            <div class="section-group-inner" id="icd-section-group"></div>
        </div>

        <div class="category-header" id="zipHeader">
            <h2>ZIPCODE</h2>
            <i data-lucide="chevron-down" class="chevron-icon"></i>
        </div>
        <div class="section-group-wrapper" id="zip-wrapper">
            <div class="section-group-inner" id="zip-section-group"></div>
        </div>

        <div class="category-header" id="memberHeader">
            <h2>MEMBER CATEGORY</h2>
            <i data-lucide="chevron-down" class="chevron-icon"></i>
        </div>
        <div class="section-group-wrapper" id="member-wrapper">
            <div class="section-group-inner" id="member-section-group"></div>
        </div>
    </div>

    <div class="bottom-floating-control-strip">
        <div class="search-inner-wrapper">
            <input type="text" id="registrySearch" placeholder="Search references, locations...">
        </div>
        <button class="action-control-btn" id="addRecordModalTrigger" title="Add Record">
            <i data-lucide="plus"></i>
        </button>
        <button class="action-control-btn" id="sortToggleTrigger" title="Rearrange Cards">
            <i data-lucide="move"></i>
        </button>
    </div>

    <div class="modal-overlay" id="addRecordModal">
        <div class="modal-content">
            <h3 id="modalDisplayTitle">ADD NEW REFERENCE</h3>
            
            <div class="input-group" id="modalTypeSelectorGroup">
                <label>REFERENCE TYPE</label>
                <div class="custom-select-wrapper">
                    <select id="modalTypeSelector">
                        <option value="icd">ICD-10 Diagnostic Definition</option>
                        <option value="member">Membership Category</option>
                        <option value="zipcode">Zip Code Mapping</option>
                    </select>
                </div>
            </div>
            
            <div class="input-group">
                 <label id="primaryFieldLabel">Diagnosis Code</label>
                 <input id="newRecordKey" type="text">
             </div>
            <div class="input-group">
                 <label id="secondaryFieldLabel">Description Value</label>
                 <input id="newRecordValue" type="text">
             </div>
            <div class="modal-copy-zone" id="modalSaveBtn">SAVE REGISTRY DATA</div>
            <button class="modal-close-btn" id="modalDismissBtn">Dismiss</button>
        </div>
    </div>

    <div class="chat-docking-panel" id="chatDock">
        <div class="chat-header-bar">
            <span id="chatTargetName">Active Session Chat</span>
            <button class="chat-close-trigger"><i data-lucide="x"></i></button>
        </div>
        <div class="chat-scroller-view" id="chatScroller"></div>
        <div class="chat-input-row">
            <input type="text" id="chatMsgInput" placeholder="Aa">
            <button id="sendChatBtn">Send</button>
        </div>
    </div>

    <script type="module" src="esoa.js"></script>
    <script type="module" src="registry.js"></script>
</body>
</html>
