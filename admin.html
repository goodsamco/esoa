    if (localStorage.getItem("userRole") !== "admin") {

    // Local runtime cache memory lookup layout to map matching names effortlessly

        const container = document.getElementById('chatLogsList');
        
        // Listen into RTDB structure configurations directly 
        const sessionsRef = ref(rtdb);
        
        onValue(sessionsRef, (snapshot) => {
            container.innerHTML = "";
            const masterData = snapshot.val() || {};
            
            const rawAggregatedMessages = [];

            // 1. Gather Group Chat Data
            if (masterData.group_chat && masterData.group_chat.messages) {
                Object.keys(masterData.group_chat.messages).forEach(mId => {
                    const item = masterData.group_chat.messages[mId];
                    rawAggregatedMessages.push({
                        sender: item.senderName || cachedUserDirectory[item.sender] || item.sender || "Unknown",
                        receiver: "👥 BARANGAY GROUP CHAT",
                        text: item.text,
                        timestamp: item.timestamp || 0
                    });
                });
            }

            // 2. Gather Private Sessions Data
            if (masterData.sessions) {
                Object.keys(masterData.sessions).forEach(sessionKey => {
                    const track = masterData.sessions[sessionKey];
                    Object.keys(track).forEach(mId => {
                        const item = track[mId];
                        // Ignore standard presence indicators or misaligned payload paths
                        if (!item.text) return; 
                        
                        // Parse composite room structural logic ids
                        const impliedIds = sessionKey.split('_');
                        const parsedSenderName = cachedUserDirectory[item.sender] || item.sender || "User";
                        
                        // Find target recipient ID out of combination array
                        const destinationId = impliedIds.find(id => id !== item.sender) || "User Partner";
                        const parsedReceiverName = cachedUserDirectory[destinationId] || destinationId;

                        rawAggregatedMessages.push({
                            sender: parsedSenderName,
                            receiver: `👤 ${parsedReceiverName}`,
                            text: item.text,
                            timestamp: item.timestamp || 0
                        });
                    });
                });
            }

            if (rawAggregatedMessages.length === 0) {
                container.innerHTML = `<div class="empty-state">No chat records detected over database feeds.</div>`;
                return;
            }

            // Sort chronologically (newest at the top)
            rawAggregatedMessages.sort((x, y) => y.timestamp - x.timestamp);

            // Display records sequentially 
            rawAggregatedMessages.forEach(msg => {
                const formattedTime = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Just now';
                const card = document.createElement('div');
                card.className = "chat-card";
                card.innerHTML = `
                    <div class="chat-meta">
                        <span><strong>${msg.sender}</strong> ➡️ <em>${msg.receiver}</em></span>
                        <span class="chat-time">${formattedTime}</span>
                    </div>
                    <div class="chat-msg">${msg.text}</div>
                `;
                container.appendChild(card);
            });
        });
    }

    // Tab Navigation Logic
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');
    };

    // Bind navigation triggers natively
    document.getElementById('btn-approvals').onclick = () => window.switchTab('approvals');
    document.getElementById('btn-activity').onclick = () => window.switchTab('activity');
    document.getElementById('btn-chats').onclick = () => window.switchTab('chats');

    // Initialize sequences
    window.onload = () => {
        loadPendingUsers();
        listenToUserActivity();
        listenToRTDBChats();
    };
</script>

            });

            // Bind Approval Logic Elements
            container.querySelectorAll('.btn-req-approve').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const reqId = e.target.getAttribute('data-reqid');
                    const accId = e.target.getAttribute('data-accid');
                    const fieldType = e.target.getAttribute('data-type');
                    const finalValue = e.target.getAttribute('data-value');

                    const updatePayload = {};
                    if (fieldType === 'name') updatePayload.name = finalValue;
                    if (fieldType === 'username') updatePayload.username = finalValue;
                    if (fieldType === 'password') updatePayload.password = finalValue;

                    try {
                        // Apply data patch directly inside Core User Document Account File reference
                        await updateDoc(doc(db, "accounts", accId), updatePayload);
                        // Safely remove structural queue ledger item
                        await deleteDoc(doc(db, "update_requests", reqId));
                    } catch (err) {
                        alert("Update error operation failed: " + err.message);
                    }
                });
            });

            // Bind Rejection Action Logic Elements
            container.querySelectorAll('.btn-req-reject').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const reqId = e.target.getAttribute('data-reqid');
                    try {
                        await deleteDoc(doc(db, "update_requests", reqId));
                    } catch (err) {
                        alert("Rejection cleanup operation failed: " + err.message);
                    }
                });
            });
        });
    }

    // --- TAB 3: ACTIVE STATUS & ACCESS CONTROL ---
    function listenToUserActivity() {
        const container = document.getElementById('activeUserList');
        const q = query(collection(db, "accounts"), where("status", "!=", "pending"));

        onSnapshot(q, (snapshot) => {
            container.innerHTML = "";
            if (snapshot.empty) {
                container.innerHTML = `<div class="empty-state">No verified accounts found.</div>`;
                return;
            }

            snapshot.forEach((userDoc) => {
                const data = userDoc.data();
                const isOnline = data.isOnline === true; 
                const isEsoaDisabled = data.esoaDisabled === true;

                const card = document.createElement('div');
                card.className = "user-card";
                card.innerHTML = `
                    <div class="user-info">
                        <div class="name">
                            ${data.customName || data.name} 
                            <span class="status-badge ${isOnline ? 'active' : 'offline'}">${isOnline ? 'ONLINE' : 'OFFLINE'}</span>
                        </div>
                        <div class="username">@${data.username} ${isEsoaDisabled ? '<span style="color:var(--danger); font-size:0.75rem;">(eSOA Disabled)</span>' : ''}</div>
                    </div>
                    <button class="btn ${isEsoaDisabled ? 'btn-enable' : 'btn-disable'}" data-id="${userDoc.id}" data-disabled="${isEsoaDisabled}">
                        ${isEsoaDisabled ? 'Enable eSOA' : 'Disable eSOA'}
                    </button>
                `;
                container.appendChild(card);
            });

            container.querySelectorAll('.btn-disable, .btn-enable').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    const currentDisabledStatus = e.target.getAttribute('data-disabled') === 'true';
                    await updateDoc(doc(db, "accounts", id), { 
                        esoaDisabled: !currentDisabledStatus 
                    });
                });
            });
        });
    }

    // --- TAB 4: REALTIME DATABASE CHAT MONITOR ---
    function listenToRTDBChats() {
        const container = document.getElementById('chatLogsList');
        const sessionsRef = ref(rtdb);

        onValue(sessionsRef, (snapshot) => {
            container.innerHTML = "";
            const masterData = snapshot.val() || {};
            const rawAggregatedMessages = [];

            // 1. Gather Group Chat Data (Cleaned Label "GROUP CHAT")
            if (masterData.group_chat && masterData.group_chat.messages) {
                Object.keys(masterData.group_chat.messages).forEach(mId => {
                    const item = masterData.group_chat.messages[mId];
                    rawAggregatedMessages.push({
                        sender: item.senderName || cachedUserDirectory[item.sender] || item.sender || "Unknown",
                        receiver: "👥 GROUP CHAT",
                        text: item.text,
                        timestamp: item.timestamp || 0                    });
                });
            }

            // 2. Gather Private Sessions Data
            if (masterData.sessions) {
                Object.keys(masterData.sessions).forEach(sessionKey => {
                    const track = masterData.sessions[sessionKey];
                    Object.keys(track).forEach(mId => {
                        const item = track[mId];
                        if (!item.text) return; 

                        const impliedIds = sessionKey.split('_');
                        const parsedSenderName = cachedUserDirectory[item.sender] || item.sender || "User";
                        const destinationId = impliedIds.find(id => id !== item.sender) || "User Partner";
                        const parsedReceiverName = cachedUserDirectory[destinationId] || destinationId;

                        rawAggregatedMessages.push({
                            sender: parsedSenderName,
                            receiver: `👤 ${parsedReceiverName}`,
                            text: item.text,
                            timestamp: item.timestamp || 0
                        });
                    });
                });
            }

            if (rawAggregatedMessages.length === 0) {
                container.innerHTML = `<div class="empty-state">No chat records detected over database feeds.</div>`;
                return;
            }

            // Sort chronologically (newest at the top)
            rawAggregatedMessages.sort((x, y) => y.timestamp - x.timestamp);

            // Display records sequentially 
            rawAggregatedMessages.forEach(msg => {
                const formattedTime = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Just now';
                const card = document.createElement('div');
                card.className = "chat-card";
                card.innerHTML = `
                    <div class="chat-meta">
                        <span><strong>${msg.sender}</strong> ➡️ <em>${msg.receiver}</em></span>
                        <span class="chat-time">${formattedTime}</span>
                    </div>
                    <div class="chat-msg">${msg.text}</div>
                `;
                container.appendChild(card);
            });
        });
    }

    // Tab Navigation Logic Layout
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');
    };

    document.getElementById('btn-approvals').onclick = () => window.switchTab('approvals');
    document.getElementById('btn-updates').onclick = () => window.switchTab('updates');
    document.getElementById('btn-activity').onclick = () => window.switchTab('activity');
    document.getElementById('btn-chats').onclick = () => window.switchTab('chats');

    // Initialize sequences
    window.onload = () => {
        loadPendingUsers();
        listenToUpdateRequests();
        listenToUserActivity();
        listenToRTDBChats();
    };
</script>
</body></html>
