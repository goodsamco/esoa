<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSOA - Core Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Poppins:wght@400;600;800&family=Roboto+Mono:wght@400;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: #161e2d;
            --primary: #38bdf8;
            --glass: rgba(56, 189, 248, 0.15);
            --text-main: #f1f5f9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            transition: background 0.3s ease;
        }

        .app-window {
            width: 100%;
            max-width: 480px;
            height: 92vh;
            background: var(--surface);
            border-radius: 28px;
            border: 1px solid var(--glass);
            box-shadow: 0 24px 60px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Interactive Header Identity Stack */
        .chat-header {
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
        }
        .header-identity {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            object-fit: cover;
            background: radial-gradient(circle, #2e3b4e 0%, #1e293b 100%);
        }
        .header-info h3 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .header-info p {
            margin: 2px 0 0 0;
            font-size: 0.7rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .header-actions {
            display: flex;
            gap: 10px;
        }
        .header-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .header-btn:hover {
            background: var(--primary);
            color: #000;
            transform: scale(1.05);
        }

        /* Chat Timeline Viewport */
        .chat-timeline {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: rgba(0,0,0,0.05);
        }

        /* Message Structure Container */
        .msg-row {
            display: flex;
            gap: 10px;
            max-width: 85%;
            position: relative;
        }
        .msg-row.incoming { align-self: flex-start; }
        .msg-row.outgoing { align-self: flex-end; flex-direction: row-reverse; }

        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid var(--glass);
            object-fit: cover;
            background: #1e293b;
            flex-shrink: 0;
            margin-top: 4px;
        }

        .msg-content-block {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .msg-sender-lbl {
            font-size: 0.65rem;
            font-weight: 800;
            color: #64748b;
            margin-left: 4px;
            text-transform: uppercase;
        }
        .msg-row.outgoing .msg-sender-lbl { text-align: right; margin-right: 4px; }

        .msg-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.9rem;
            line-height: 1.4;
            position: relative;
            cursor: pointer;
            user-select: none;
            transition: transform 0.2s;
        }
        .msg-row.incoming .msg-bubble {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.05);
            border-top-left-radius: 4px;
        }
        .msg-row.outgoing .msg-bubble {
            background: var(--primary);
            color: #000;
            border-top-right-radius: 4px;
            font-weight: 600;
        }
        .msg-bubble:active { transform: scale(0.98); }

        /* Dynamic Reactions Layer */
        .reaction-badge-dock {
            display: flex;
            gap: 4px;
            position: absolute;
            bottom: -12px;
            right: 10px;
            z-index: 10;
        }
        .msg-row.outgoing .reaction-badge-dock { left: 10px; right: auto; }
        
        .reaction-pill {
            background: #1e293b;
            border: 1px solid var(--glass);
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            gap: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Contextual Popover Reaction Drawer */
        .reaction-drawer {
            position: absolute;
            top: -46px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            background: rgba(22, 30, 45, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass);
            border-radius: 30px;
            padding: 6px 12px;
            display: flex;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            z-index: 500;
        }
        .reaction-drawer.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) scale(1);
        }
        .react-node {
            font-size: 1.25rem;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .react-node:hover { transform: scale(1.3); }

        /* Terminal Input Tray */
        .input-tray {
            padding: 16px 20px;
            background: rgba(0,0,0,0.2);
            border-top: 1px solid var(--glass);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .msg-input {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--glass);
            border-radius: 16px;
            padding: 14px 18px;
            color: #fff;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .msg-input:focus { border-color: var(--primary); }
        
        .btn-send {
            width: 46px;
            height: 46px;
            border-radius: 16px;
            background: var(--primary);
            color: #000;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-send:hover { transform: scale(1.04); }
    </style>
</head>
<body>

<div class="app-window">
    <header class="chat-header">
        <div class="header-identity">
            <img id="userHeaderAvatar" class="header-avatar" src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix" alt="Profile Node">
            <div class="header-info">
                <h3 id="userHeaderName">Loading Node...</h3>
                <p>Global Router / Lepaga Network</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="window.location.href='customization.html'" title="Customize Studio">
                <i data-lucide="sliders"></i>
            </button>
        </div>
    </header>

    <main class="chat-timeline" id="chatTimeline">
        </main>

    <div class="reaction-drawer" id="globalReactionDrawer">
        <span class="react-node" data-emoji="😆" title="Haha">😆</span>
        <span class="react-node" data-emoji="😢" title="Sad">😢</span>
        <span class="react-node" data-emoji="😠" title="Angry">😠</span>
        <span class="react-node" data-emoji="🖕" title="Middle Finger">🖕</span>
    </div>

    <footer class="input-tray">
        <input type="text" id="messageInputField" class="msg-input" placeholder="Transmit telemetry packet to group...">
        <button class="btn-send" id="sendMessageBtn">
            <i data-lucide="send"></i>
        </button>
    </footer>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, query, orderBy, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDaeNQF4qmW0vvwxUPp_NztnT0hoLzm1BQ",
        authDomain: "svls-289ee.firebaseapp.com",
        databaseURL: "https://svls-289ee-default-rtdb.firebaseio.com",
        projectId: "svls-289ee",
        storageBucket: "svls-289ee.firebasestorage.app",
        messagingSenderId: "500705386198",
        appId: "1:500705386198:web:96f189662bc2aa99cf7377",
        measurementId: "G-5TNBMQ2HN5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const userId = localStorage.getItem("userId");
    if (!userId) window.location.href = "login.html";

    let activeTargetMessageId = null;
    const chatTimeline = document.getElementById('chatTimeline');
    const messageInputField = document.getElementById('messageInputField');
    const sendMessageBtn = document.getElementById('sendMessageBtn');
    const globalReactionDrawer = document.getElementById('globalReactionDrawer');

    const premium3dAssets = {
        'bg-theme-1': 'https://img.magnific.com/premium-vector/smooth-gradient-colors-from-teal-orange-with-black-background-grainy-white-background-ar-3_858664-35836.jpg?semt=ais_hybrid&w=740&q=80?w=150',
        'bg-theme-2': 'https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?w=800',
        'bg-theme-3': 'https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=800',
        'bg-theme-4': 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800'
    };

    function hexToRgb(hex) {
        let c;
        if(/^#([A-Fa-f0-9]{3}){1,2}$/.test(hex)){
            c= hex.substring(1).split('');
            if(c.length== 3){ c= [c[0], c[0], c[1], c[1], c[2], c[2]]; }
            c= '0x'+c.join('');
            return [(c>>16)&255, (c>>8)&255, c&255].join(',');
        }
        return "56,189,248";
    }

    function hslToHex(h, s, l) {
        l /= 100;
        const a = s * Math.min(l, 1 - l) / 100;
        const f = n => {
            const k = (n + h / 30) % 12;
            const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
            return Math.round(255 * color).toString(16).padStart(2, '0');
        };
        return `#${f(0)}${f(8)}${f(4)}`;
    }

    /* Core Dynamic Interface Calibration Engine */
    async function synchronizeUserEnvironmentTheme() {
        try {
            const docRef = doc(db, "accounts", userId);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                
                // Track & Update Profile Header Details
                const currentName = data.customName || localStorage.getItem("userName") || "Ident Node";
                const rawAvatar = data.avatarUrl || "avatar-m1";
                const resolvedAvatar = rawAvatar.startsWith('http') ? rawAvatar : `https://api.dicebear.com/7.x/notionists/svg?seed=${rawAvatar}`;

                document.getElementById('userHeaderName').innerText = currentName;
                document.getElementById('userHeaderAvatar').src = resolvedAvatar;

                // Sync Global Typography Fonts
                if (data.fontFamily) document.body.style.fontFamily = data.fontFamily;

                // Wallpaper Canvas Mode Processing
                if (data.bgMode === "image") {
                    const mappedImg = premium3dAssets[data.bgValue] || data.bgValue;
                    document.body.style.backgroundImage = `url('${mappedImg}')`;
                } else if (data.bgValue) {
                    document.body.style.backgroundImage = "none";
                    document.body.style.backgroundColor = data.bgValue;
                }

                /* CRITICAL FIX: Compute color variables using btnValue REGARDLESS of image selections.
                   This makes sure the slider color scales properly across all layouts.
                */
                let activeHexAccent = "#38bdf8";
                if (data.btnValue) {
                    if (data.btnValue.includes('hsl')) {
                        const tokens = data.btnValue.match(/\d+/g);
                        if (tokens && tokens.length >= 3) {
                            activeHexAccent = hslToHex(parseInt(tokens[0]), parseInt(tokens[1]), parseInt(tokens[2]));
                        }
                    } else if (data.btnValue.startsWith('#')) {
                        activeHexAccent = data.btnValue;
                    }
                }
                
                document.documentElement.style.setProperty('--primary', activeHexAccent);
                document.documentElement.style.setProperty('--glass', `rgba(${hexToRgb(activeHexAccent)}, 0.16)`);
            }
        } catch (err) {
            console.error("Environment pipeline crash:", err);
        }
    }

    /* Real-Time Database Message Stream Pipeline with Group Profiles and Reactions */
    function initializeRealtimeMessagePipeline() {
        const messageQuery = query(collection(db, "groupMessages"), orderBy("timestamp", "asc"));
        
        onSnapshot(messageQuery, (snapshot) => {
            chatTimeline.innerHTML = "";
            snapshot.forEach((docSnap) => {
                const messageData = docSnap.data();
                const msgId = docSnap.id;
                
                const isMyMessage = messageData.senderId === userId;
                const userAvatarValue = messageData.senderAvatar || "avatar-m1";
                const avatarRenderSrc = userAvatarValue.startsWith('http') ? userAvatarValue : `https://api.dicebear.com/7.x/notionists/svg?seed=${userAvatarValue}`;

                const rowElement = document.createElement('div');
                rowElement.classList.add('msg-row', isMyMessage ? 'outgoing' : 'incoming');

                // Render group avatar image node on message bubble profiles
                const imgNode = document.createElement('img');
                imgNode.className = "msg-avatar";
                imgNode.src = avatarRenderSrc;
                rowElement.appendChild(imgNode);

                const baseContentBlock = document.createElement('div');
                baseContentBlock.className = "msg-content-block";

                // Sender Display Labels
                const senderLabel = document.createElement('span');
                senderLabel.className = "msg-sender-lbl";
                senderLabel.innerText = messageData.senderName || "Node User";
                baseContentBlock.appendChild(senderLabel);

                // Bubble Content Container
                const bubble = document.createElement('div');
                bubble.className = "msg-bubble";
                bubble.innerText = messageData.text || "";
                
                // Attach Event Handlers to open Popover Emoji Drawer
                bubble.addEventListener('click', (event) => {
                    event.stopPropagation();
                    triggerReactionDrawerPopover(msgId, bubble);
                });

                baseContentBlock.appendChild(bubble);

                // Process and mount explicit user reactions layout stack
                if (messageData.reactions && Object.keys(messageData.reactions).length > 0) {
                    const pillBox = document.createElement('div');
                    pillBox.className = "reaction-badge-dock";
                    
                    Object.entries(messageData.reactions).forEach(([emoji, count]) => {
                        if (count > 0) {
                            const badge = document.createElement('div');
                            badge.className = "reaction-pill";
                            badge.innerHTML = `<span>${emoji}</span><span>${count}</span>`;
                            pillBox.appendChild(badge);
                        }
                    });
                    baseContentBlock.appendChild(pillBox);
                }

                rowElement.appendChild(baseContentBlock);
                chatTimeline.appendChild(rowElement);
            });
            chatTimeline.scrollTop = chatTimeline.scrollHeight;
        });
    }

    /* Handle Message Dispatch Pipeline */
    async function transmitGroupMessage() {
        const textMessage = messageInputField.value.trim();
        if (!textMessage) return;

        try {
            // Retrieve latest profile metadata layers from storage caches safely
            const cachedName = localStorage.getItem("userName") || "Node User";
            const cachedAvatar = localStorage.getItem("avatarUrl") || "avatar-m1";

            await addDoc(collection(db, "groupMessages"), {
                text: textMessage,
                senderId: userId,
                senderName: cachedName,
                senderAvatar: cachedAvatar,
                timestamp: new Date().getTime(),
                reactions: {}
            });
            messageInputField.value = "";
        } catch (error) {
            console.error("Packet drop exception encountered:", error);
        }
    }

    /* Popover Reaction Drawer Engine */
    function triggerReactionDrawerPopover(messageId, elementTarget) {
        activeTargetMessageId = messageId;
        const rect = elementTarget.getBoundingClientRect();
        const mainContainerRect = chatTimeline.getBoundingClientRect();

        // Position drawer popover context layer layout gracefully over targeted item node
        globalReactionDrawer.style.top = `${rect.top - mainContainerRect.top + chatTimeline.scrollTop - 40}px`;
        globalReactionDrawer.style.left = `${rect.left - mainContainerRect.left + (rect.width / 2)}px`;
        globalReactionDrawer.classList.add('active');
    }

    // Dismiss custom reaction popover layouts cleanly
    document.addEventListener('click', () => {
        globalReactionDrawer.classList.remove('active');
        activeTargetMessageId = null;
    });

    // Capture click events inside the interactive emoji drawer array nodes
    document.querySelectorAll('.react-node').forEach(node => {
        node.addEventListener('click', async (e) => {
            e.stopPropagation();
            const emojiSelected = node.getAttribute('data-emoji');
            
            if (activeTargetMessageId) {
                try {
                    const docRef = doc(db, "groupMessages", activeTargetMessageId);
                    const docSnap = await getDoc(docRef);
                    
                    if (docSnap.exists()) {
                        const currentData = docSnap.data();
                        const currentReactions = currentData.reactions || {};
                        
                        // Mutate atomic snapshot keys to track total reactions incrementally
                        currentReactions[emojiSelected] = (currentReactions[emojiSelected] || 0) + 1;
                        
                        await updateDoc(docRef, { reactions: currentReactions });
                    }
                } catch (err) {
                    console.error("Failed to commit reaction node adjustment:", err);
                }
            }
            globalReactionDrawer.classList.remove('active');
        });
    });

    // Send Interactions Binding Keys
    sendMessageBtn.addEventListener('click', transmitGroupMessage);
    messageInputField.addEventListener('keydown', (e) => { if (e.key === 'Enter') transmitGroupMessage(); });

    // Initialize Global App Setup
    window.onload = () => {
        synchronizeUserEnvironmentTheme();
        initializeRealtimeMessagePipeline();
        lucide.createIcons();
    };
</script>
</body>
</html>
