<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSOA - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: #161e2d;
            --primary: #38bdf8;
            --text-main: #f1f5f9;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 380px;
            background: var(--surface);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: 1px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 18px;
            text-align: left;
        }
        .input-group label {
            font-size: 0.7rem;
            color: var(--primary);
            font-weight: 800;
            margin-left: 5px;
            letter-spacing: 1px;
        }
        input, select {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 14px;
            margin-top: 6px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border 0.3s ease, opacity 0.3s ease;
        }
        input:focus, select:focus { 
            outline: none; 
            border-color: var(--primary); 
        }
        input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            background: rgba(0,0,0,0.5);
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: var(--bg);
            border: none;
            border-radius: 12px;
            font-weight: 800;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.2s ease;
        }
        .btn-submit:hover { transform: translateY(-2px); background: #6feeff; }
        .msg { margin-top: 15px; font-size: 0.85rem; min-height: 20px; }
        .link-text {
            display: inline-block;
            margin-top: 20px;
            color: #64748b;
            font-size: 0.85rem;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .link-text:hover { color: var(--primary); }
        .hidden { display: none; }
    </style></head><body>

<div class="container">
    <div id="loginSection">
        <h2>ACCOUNT LOGIN</h2>
        <form id="loginForm">
            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" id="logUser" required placeholder="username">
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="logPass" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">LOG IN</button>
        </form>
        <div class="msg" id="logMsg"></div>
        <a id="toForgotBtn" class="link-text">Forgot Credentials / Password?</a><br>
        <a href="register.html" class="link-text">No account? Register here</a>
    </div>

    <div id="forgotSection" class="hidden">
        <h2>ACCOUNT RECOVERY</h2>
        <form id="forgotForm">
            <div class="input-group">
                <label>WHAT DO YOU NEED TO DO?</label>
                <select id="updateType">
                    <option value="password">Forgot Password (Reset)</option>
                    <option value="name">Change Full Name (Requires Pass Verification)</option>
                    <option value="username">Change Username (Requires Pass Verification)</option>
                </select>
            </div>

            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" id="recUser" required placeholder="your_username">
            </div>

            <div class="input-group hidden" id="groupVerifyPass">
                <label>CURRENT PASSWORD (IDENTITY VERIFICATION)</label>
                <input type="password" id="recPass" placeholder="••••••••" disabled>
            </div>
            
            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:20px 0;">

            <div class="input-group field-group" id="groupNewPass">
                <label>NEW PASSWORD</label>
                <input type="password" id="newPass" required placeholder="••••••••">
            </div>
            <div class="input-group field-group hidden" id="groupNewName">
                <label>NEW FULL NAME</label>
                <input type="text" id="newName" placeholder="John Doe" disabled>
            </div>
            <div class="input-group field-group hidden" id="groupNewUser">
                <label>NEW USERNAME</label>
                <input type="text" id="newUser" placeholder="newusername123" disabled>
            </div>

            <button type="submit" class="btn-submit">SUBMIT REQUEST</button>
        </form>
        <div class="msg" id="forgotMsg"></div>
        <a id="toLoginBtn" class="link-text">Back to Login</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDaeNQF4qmW0vvwxUPp_NztnT0hoLzm1BQ",
        authDomain: "svls-289ee.firebaseapp.com",
        databaseURL: "https://svls-289ee-default-rtdb.firebaseio.com",
        projectId: "svls-289ee",
        storageBucket: "svls-289ee.firebasestorage.app",
        messagingSenderId: "500705386198",
        appId: "1:500705386198:web:96f189662bc2aa99cf7377",
        measurementId: "G-5TNBMQ2HN5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const loginSection = document.getElementById('loginSection');
    const forgotSection = document.getElementById('forgotSection');
    const updateType = document.getElementById('updateType');

    // Navigation toggles
    document.getElementById('toForgotBtn').addEventListener('click', () => {
        loginSection.classList.add('hidden');
        forgotSection.classList.remove('hidden');
    });
    document.getElementById('toLoginBtn').addEventListener('click', () => {
        forgotSection.classList.add('hidden');
        loginSection.classList.remove('hidden');
    });

    // Handle dynamic form rendering behavior
    updateType.addEventListener('change', (e) => {
        const value = e.target.value;
        
        // Reset inputs state
        document.querySelectorAll('.field-group').forEach(group => group.classList.add('hidden'));
        document.getElementById('newPass').disabled = true;
        document.getElementById('newName').disabled = true;
        document.getElementById('newUser').disabled = true;
        document.getElementById('newPass').required = false;
        document.getElementById('newName').required = false;
        document.getElementById('newUser').required = false;

        if (value === 'password') {
            // Forgot Password doesn't require current password input
            document.getElementById('groupVerifyPass').classList.add('hidden');
            document.getElementById('recPass').disabled = true;
            document.getElementById('recPass').required = false;

            document.getElementById('groupNewPass').classList.remove('hidden');
            document.getElementById('newPass').disabled = false;
            document.getElementById('newPass').required = true;
        } else {
            // Changing Name or Username demands current password confirmation
            document.getElementById('groupVerifyPass').classList.remove('hidden');
            document.getElementById('recPass').disabled = false;
            document.getElementById('recPass').required = true;

            if (value === 'name') {
                document.getElementById('groupNewName').classList.remove('hidden');
                document.getElementById('newName').disabled = false;
                document.getElementById('newName').required = true;
            } else if (value === 'username') {
                document.getElementById('groupNewUser').classList.remove('hidden');
                document.getElementById('newUser').disabled = false;
                document.getElementById('newUser').required = true;
            }
        }
    });

    // Handle standard log in logic
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('logUser').value.trim().toLowerCase();
        const password = document.getElementById('logPass').value;
        const msg = document.getElementById('logMsg');

        try {
            const q = query(collection(db, "accounts"), where("username", "==", username), where("password", "==", password));
            const querySnap = await getDocs(q);

            if (querySnap.empty) {
                msg.style.color = "#ef4444";
                msg.innerText = "Invalid username or password.";
                return;
            }

            const userDoc = querySnap.docs[0];
            const userData = userDoc.data();

            localStorage.setItem("userId", userDoc.id);
            localStorage.setItem("userRole", userData.role);
            localStorage.setItem("userName", userData.name);

            if (userData.role === "admin") {
                msg.style.color = "#ffee00";
                msg.innerText = "Welcome back Admin. Loading panel...";
                setTimeout(() => window.location.href = "admin.html", 1000);
            } else {
                if (userData.status === "pending") {
                    msg.style.color = "#ef4444";
                    msg.innerText = "Your account is awaiting Admin approval.";
                    localStorage.clear();
                } else {
                    msg.style.color = "#ffee00";
                    msg.innerText = "Login successful! Loading options...";
                    setTimeout(() => window.location.href = "customization.html", 1000);
                }
            }
        } catch (err) {
            msg.style.color = "#ef4444";
            msg.innerText = "Authentication error: " + err.message;
        }
    });

    // Handle account structural edits and reset validation processing
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const recUser = document.getElementById('recUser').value.trim().toLowerCase();
        const typeSelected = updateType.value;
        const msg = document.getElementById('forgotMsg');

        try {
            let userDoc = null;

            if (typeSelected === "password") {
                // Path 1: Forgot password logic -> Verify only username existence
                const q = query(collection(db, "accounts"), where("username", "==", recUser));
                const querySnap = await getDocs(q);
                if (querySnap.empty) {
                    msg.style.color = "#ef4444";
                    msg.innerText = "Username not found in database records.";
                    return;
                }
                userDoc = querySnap.docs[0];
            } else {
                // Path 2: Data adjustment logic -> Verify username AND password explicitly
                const recPass = document.getElementById('recPass').value;
                const q = query(collection(db, "accounts"), where("username", "==", recUser), where("password", "==", recPass));
                const querySnap = await getDocs(q);
                if (querySnap.empty) {
                    msg.style.color = "#ef4444";
                    msg.innerText = "Verification failed. Invalid username or current password.";
                    return;
                }
                userDoc = querySnap.docs[0];
            }

            const userId = userDoc.id;
            let requestedValue = "";

            if (typeSelected === "password") {
                requestedValue = document.getElementById('newPass').value;
            } else if (typeSelected === "name") {
                requestedValue = document.getElementById('newName').value.trim();
            } else if (typeSelected === "username") {
                requestedValue = document.getElementById('newUser').value.trim().toLowerCase();
                
                // Confirm unique user choice uniqueness
                const uniqueCheck = query(collection(db, "accounts"), where("username", "==", requestedValue));
                const uniqueSnap = await getDocs(uniqueCheck);
                if (!uniqueSnap.empty) {
                    msg.style.color = "#ef4444";
                    msg.innerText = "The proposed new username is already taken.";
                    return;
                }
            }

            if (!requestedValue) {
                msg.style.color = "#ef4444";
                msg.innerText = "Please input the new value data field.";
                return;
            }

            // Post request object token into change management ledger
            await addDoc(collection(db, "update_requests"), {
                accountId: userId,
                currentUsername: recUser,
                requestType: typeSelected,
                newValue: requestedValue,
                status: "pending",
                timestamp: new Date().toISOString()
            });

            msg.style.color = "#ffee00";
            msg.innerText = "Request logged! Redirecting to login view...";
            document.getElementById('forgotForm').reset();
            
            updateType.value = "password";
            updateType.dispatchEvent(new Event('change'));

            setTimeout(() => {
                forgotSection.classList.add('hidden');
                loginSection.classList.remove('hidden');
                msg.innerText = "";
            }, 3000);

        } catch (err) {
            msg.style.color = "#ef4444";
            msg.innerText = "Submission error: " + err.message;
        }
    });
</script>
</body></html>
