<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICD10 & Reference Registry</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Poppins:wght@400;600;800&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="stylesheet" href="esoa.css">

    <style>
        :root {
            /* Fallback value established if local storage parameters haven't compiled yet */
            --primary: hsl(111, 100%, 60%);
            --glass: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --success: #00e676;
        }

        /* Floating Control Dock perfectly stacked above the profile layout */
        .bottom-floating-control-strip {
            position: fixed;
            bottom: 110px; 
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 400px;
            height: 70px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass);
            border-radius: 35px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-sizing: border-box;
            gap: 10px;
            z-index: 3100;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
        }

        .search-inner-wrapper {
            flex-grow: 1;
            position: relative;
        }

        .search-inner-wrapper input {
            width: 100%;
            padding: 10px 14px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass);
            color: var(--text-main);
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-inner-wrapper input:focus {
            border-color: var(--primary) !important;
        }

        .action-control-btn {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass);
            border-radius: 50%;
            color: var(--primary) !important;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .action-control-btn:hover, .action-control-btn.active-mode {
            background: var(--primary) !important;
            border-color: var(--primary) !important;
            color: #000 !important;
            transform: translateY(-2px);
        }

        /* Direct adaptive typography setups with explicit structural fallbacks */
        .item-row .item-code-prefix {
            font-family: 'Roboto Mono', monospace;
            color: var(--primary) !important;
            font-weight: 700;
            margin-right: 10px;
            font-size: 0.95rem;
        }

        .item-row .item-desc-text {
            font-size: 0.78rem !important;
            color: #aaaaaa;
            font-weight: 400;
        }

        /* Context Actions layout injection for inline row modifications */
        .row-context-actions {
            display: none;
            gap: 6px;
            align-items: center;
            z-index: 10;
        }

        .context-action-node {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--glass);
            background: rgba(0,0,0,0.4);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .context-action-node.edit-trigger:hover {
            background: var(--success);
            color: #000;
            border-color: var(--success);
        }

        .context-action-node.delete-trigger:hover {
            background: #ff4444;
            color: #fff;
            border-color: #ff4444;
        }

        /* Movable Layout Reordering & Administrative active states */
        .edit-mode-active .item-row {
            cursor: grab !important;
            border: 1px dashed var(--primary) !important;
            background: rgba(255, 255, 255, 0.02);
        }

        .edit-mode-active .item-row .row-context-actions {
            display: flex; 
        }

        .item-row.dragging {
            opacity: 0.35;
            background: var(--glass);
            transform: scale(0.98);
        }
    </style>
</head>
<body onmouseleave="if(typeof resetMagnet === 'function') resetMagnet()">

    <div class="peer-wrapper-row">
        <button class="scroll-nav-btn prev" title="Scroll Left"><i data-lucide="chevron-left"></i></button>
        <div class="peer-active-hub" id="peerActiveHub"></div>
        <button class="scroll-nav-btn next" title="Scroll Right"><i data-lucide="chevron-right"></i></button>
    </div>

        <div class="top-nav">
        <button class="top-btn" title="Reset" onclick="resetFocus()"><i data-lucide="refresh-cw"></i></button> 
        <button class="top-btn" title="Senior Discount" onclick="toggleModal('srModal', true)"><i data-lucide="user-check"></i></button>
        <button class="top-btn active" title="eSOA" onclick="window.location.href='esoa.html'"><i data-lucide="receipt"></i></button>
        <button class="top-btn" title="ICD10 Codes" onclick="window.location.href='icd10.html'" style="background-color: rgba(255, 255, 255, 0.15);"><i data-lucide="stethoscope"></i></button>
        <button class="top-btn" title="CF4 Form" onclick="window.location.href='cf4.html'"><i data-lucide="credit-card"></i></button>
    </div>

    <img id="userDisplayAvatar" class="profile-avatar-node" src="https://api.dicebear.com/7.x/notionists/svg?seed=Felix" alt="User Avatar" onclick="window.location.href='customization.html'">
    <span id="userDisplayName" class="name-string">EJ</span>

    <div class="container" id="mainContainer">
        <div id="highlighter"></div>

        <h2>ICD-10 Diagnostic Codes</h2>
        <div id="icd-section-group"></div>

        <h2>ZIPCODE</h2>
        <div id="zip-section-group"></div>

        <h2>MEMBER CATEGORY</h2>
        <div id="member-section-group"></div>
    </div>

    <div class="bottom-floating-control-strip">
        <div class="search-inner-wrapper">
            <input type="text" id="registrySearch" placeholder="Search references, locations..." oninput="filterRegistryRealtime()">
        </div>
        <button class="action-control-btn" title="Add Record" onclick="toggleModal('addRecordModal', true)">
            <i data-lucide="plus"></i>
        </button>
        <button class="action-control-btn" id="sortToggleTrigger" title="Rearrange Cards" onclick="toggleMovableLayout()">
            <i data-lucide="move"></i>
        </button>
    </div>

    <div class="modal-overlay" id="addRecordModal" onclick="closeOutside(event, 'addRecordModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="modalDisplayTitle">ADD NEW REFERENCE</h3>
            <input type="hidden" id="editRowTargetId" value="">
            <div class="input-group" id="modalTypeSelectorGroup">
                <label>REFERENCE TYPE</label>
                <select id="modalTypeSelector" onchange="synchronizeModalInputs()" style="width:100%; background:#000; color:white; padding:14px; border:1px solid rgba(83,83,83,0.2); border-radius:16px; margin-top:5px; font-weight:700;">
                    <option value="icd">ICD-10 Diagnostic Definition</option>
                    <option value="member">Membership Category</option>
                    <option value="zipcode">Zip Code Mapping</option>
                </select>
            </div>
            <div class="input-group">
                 <label id="primaryFieldLabel">Diagnosis Code</label>
                 <input id="newRecordKey" type="text" placeholder="e.g., J06.9">
             </div>
            <div class="input-group">
                 <label id="secondaryFieldLabel">Description Value</label>
                 <input id="newRecordValue" type="text" placeholder="e.g., UPPER RESPIRATORY TRACT INFECTION">
             </div>
            <div class="modal-copy-zone" id="modalSaveBtn" onclick="pushRecordToDatabase()" style="background: var(--primary); color: #000;">SAVE REGISTRY DATA</div>
            <button class="modal-close-btn" onclick="toggleModal('addRecordModal', false)">Dismiss</button>
        </div>
    </div>

    <div class="modal-overlay" id="srModal" onclick="closeOutside(event, 'srModal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>DISCOUNT CALCULATOR</h3>
            <div class="input-group">
                 <label>HOSPITAL CHARGES</label>
                 <input id="hospCharges" type="number" placeholder="0.00" oninput="if(typeof calcSr === 'function') calcSr()">
             </div>
            <div class="input-group">
                 <label>CASE RATE (PHIC)</label>
                 <input id="caseRate" type="number" placeholder="0.00" oninput="if(typeof calcSr === 'function') calcSr()">
             </div>
            <div class="modal-result" style="border-color: var(--primary);"><div id="finalDiscount" style="color: var(--primary);">0.00</div></div>
            <div class="modal-copy-zone" id="modalCopyBtn" onclick="if(typeof copyModalValue === 'function') copyModalValue()" style="background: var(--primary); color: #000;">COPY CALCULATION</div>
            <button class="modal-close-btn" onclick="toggleModal('srModal', false)">Dismiss</button>
        </div>
    </div>

    <script type="module" src="esoa.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        let layoutMovableActive = false;
        let rtdb, db;
        let activeEditRow = null;

        const baseDataset = {
            icd: [
                { code: "J06.9", desc: "UPPER RESPIRATORY TRACT INFECTION" },
                { code: "M06.99", desc: "ARTHRITIS" },
                { code: "I10.1", desc: "HYPERTENSION STAGE II" },
                { code: "I10.9", desc: "ESSENTIAL HYPERTENSION" },
                { code: "K29.9", desc: "GASTRITIS" },
                { code: "G44.2", desc: "TENSION HEADACHE" },
                { code: "H81.1", desc: "BENIGN PAROXYSMAL VERTIGO" },
                { code: "K29.1", desc: "ACUTE GASTRITIS" },
                { code: "K27.9", desc: "PEPTIC ULCER" },
                { code: "H60.3", desc: "EXTERNAL INFECTIVE OTITIS" },
                { code: "J11.1", desc: "INFLUENZA" },
                { code: "E11.9", desc: "DIABETES MELLITUS" },
                { code: "B34.9", desc: "VIRAL INFECTION" },
                { code: "BO1.9", desc: "VARICELLA" },
                { code: "S01.9", desc: "OPEN WOUND of HEAD" },
                { code: "L03.9", desc: "CELLULITIS" },
                { code: "L03.2", desc: "CELLULITIS OF FACE" },
                { code: "J20.9", desc: "ACUTE BRONCHITIS" },
                { code: "T78.4", desc: "HYPERSENSITIVITY REACTION" },
                { code: "T79.3", desc: "POST-TRAUMATIC WOUND INFECTION" },
                { code: "J45.90", desc: "BRONCHIAL ASTHMA IN ACUTE EXACERBATION" },
                { code: "O21.9", desc: "VOMITING OF PREGNANCY" },
                { code: "B34.1", desc: "ECHOVIRUS INFECTION NOS" },
                { code: "J45.0", desc: "ALLERGIC BRONCHITIS" },
                { code: "H66.9", desc: "OTITIS MEDIA" },
                { code: "J03.9", desc: "ACUTE TONSILLITIS" },
                { code: "K30", desc: "DYSPEPSIA" },
                { code: "M00.99", desc: "PYOGENIC ARTHRITIS" },
                { code: "A97.1", desc: "DENGUE WITH WARNING SIGNS" },
                { code: "K11.2", desc: "SIALOADENITIS" },
                { code: "M19.99", desc: "ARTHROSIS" },
                { code: "G43.9", desc: "MIGRAINE" },
                { code: "K21.9", desc: "GASTRO-OESOPHAGEAL REFLUX DISEASE WITHOUT OESOPHAGITIS" }
            ],
            member: [
                { code: "POS INCAPABLE", desc: "INDIGENT" },
                { code: "NTHS", desc: "INDIGENT" },
                { code: "LISTAHAN", desc: "INDIGENT" },
                { code: "DIRECT", desc: "CONTRIBUTOR - INDIVIDUAL PAYING" },
                { code: "INDIRECT", desc: "CONTRIBUTOR - INDIGENT" },
                { code: "SELF EARNING", desc: "INDIVIDUAL PAYING" },
                { code: "INFORMAL SECTOR", desc: "INDIVIDUAL PAYING" },
                { code: "SPONSORED LGU", desc: "EMPLOYED GOVERNMENT" }
            ],
            zipcode: [
                { code: "9417", desc: "ARAKAN" },
                { code: "9415", desc: "ALEOSAN" },
                { code: "9400", desc: "PIGKAWAYAN" },
                { code: "9410", desc: "MIDSAYAP" },
                { code: "9405", desc: "PRES ROXAS" },
                { code: "9400", desc: "KIDAPAWAN" },
                { code: "9414", desc: "ANTIPAS" },
                { code: "9406", desc: "MATALAM" },
                { code: "9401", desc: "MAKILALA" },
                { code: "9402", desc: "M'LANG" },
                { code: "9407", desc: "KABACAN" },
                { code: "9408", desc: "CARMEN" },
                { code: "9411", desc: "LIBUNGAN" },
                { code: "9404", desc: "MAGEPT" }
            ]
        };
        
        try {
            rtdb = getDatabase();
            db = getFirestore();
        } catch(e) {
            console.warn("Firebase execution parameters derived locally.");
        }

        function pullParsedAccentColor() {
            let customAccent =
                localStorage.getItem('btnValue') ||
                localStorage.getItem('accentColor') ||
                localStorage.getItem('customAccent');

            if (customAccent) {
                document.documentElement.style.setProperty(
                    '--primary',
                    customAccent
                );
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            pullParsedAccentColor();

            const activeBtn = document.querySelector('.top-btn.active');
            if (activeBtn) {
                const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim();
                activeBtn.style.borderColor = primaryColor;
                activeBtn.style.color = primaryColor;
            }
        });

        // Database Synced Initialization Layer
        async function initializeRegistryData() {
            pullParsedAccentColor();
            
            const sectionMap = { icd: 'icd-section-group', member: 'member-section-group', zipcode: 'zip-section-group' };
            
            for (const type of ['icd', 'member', 'zipcode']) {
                const targetContainer = document.getElementById(sectionMap[type]);
                if (!targetContainer) continue;
                targetContainer.innerHTML = '';

                let activeList = [];

                try {
                    if (rtdb) {
                        const snapshot = await get(child(ref(rtdb), `clinical_references/${type}`));
                        if (snapshot.exists()) {
                            const dataObj = snapshot.val();
                            activeList = Object.keys(dataObj).map(k => ({ code: dataObj[k].code, desc: dataObj[k].description }));
                        }
                    }
                } catch (e) { console.warn("RTDB fetching faulted; switching fallback parameters."); }

                if (activeList.length === 0) {
                    activeList = baseDataset[type];
                    try {
                        if (rtdb) {
                            for(const item of activeList) {
                                const sanitizedKey = item.code.replace(/[.#$\[\]]/g, "_");
                                await set(ref(rtdb, `clinical_references/${type}/${sanitizedKey}`), { code: item.code, description: item.desc });
                            }
                        }
                    } catch(err) {}
                }

                // Strictly slices array data sets down to an initial 5 entries limit
                const slicedList = activeList.slice(0, 5);
                slicedList.forEach(item => {
                    appendRowToDOM(targetContainer, type, item.code, item.desc);
                });
            }
            if (window.lucide) window.lucide.createIcons();
        }

        function appendRowToDOM(container, type, key, val) {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'item-row';
            rowDiv.setAttribute('data-ref-type', type === 'icd' ? 'icd' : 'misc');
            rowDiv.setAttribute('data-code', key);
            rowDiv.setAttribute('data-val', type === 'icd' ? val : `${key} - ${val}`);
            rowDiv.onclick = function() { handleSelectiveCopy(this); };
            
            rowDiv.innerHTML = `
                <span class="text-content"><span class="item-code-prefix">${key}</span><span class="item-desc-text">${val}</span></span>
                <div class="row-context-actions" onclick="event.stopPropagation()">
                    <button class="context-action-node edit-trigger" title="Edit Item" onclick="openInlineEdit(this.closest('.item-row'))"><i data-lucide="edit-2" style="width:14px;height:14px;"></i></button>
                    <button class="context-action-node delete-trigger" title="Delete Item" onclick="deleteInlineRow(this.closest('.item-row'))"><i data-lucide="trash-2" style="width:14px;height:14px;"></i></button>
                </div>
            `;
            
            container.appendChild(rowDiv);
            bindDragDropSequence(rowDiv);
        }

        // Realtime Registry Matching Strategy
        window.filterRegistryRealtime = function() {
            const query = document.getElementById('registrySearch').value.toLowerCase().trim();
            const rows = document.querySelectorAll('.item-row');

            rows.forEach(row => {
                const code = row.getAttribute('data-code').toLowerCase();
                const textVal = row.getAttribute('data-val').toLowerCase();
                if (code.includes(query) || textVal.includes(query)) {
                    row.style.display = 'flex';
                } else {
                    row.style.display = 'none';
                }
            });
        };

        // Intelligent Extraction & Copy Handling with Reset Action
        window.handleSelectiveCopy = function(element) {
            if (layoutMovableActive) return;

            const type = element.getAttribute('data-ref-type');
            const dataVal = element.getAttribute('data-val');
            let finalCopyString = dataVal;

            navigator.clipboard.writeText(finalCopyString).then(() => {
                const textNode = element.querySelector('.item-desc-text');
                const originalText = textNode.textContent;
                textNode.textContent = "COPIED VALUE!";
                
                setTimeout(() => { 
                    textNode.textContent = originalText;
                    resetViewRegistry();
                }, 1000);
            });
        };

        // Context-Aware Responsive Modal Field Transformer
        window.synchronizeModalInputs = function() {
            const currentType = document.getElementById('modalTypeSelector').value;
            const primaryLabel = document.getElementById('primaryFieldLabel');
            const secondaryLabel = document.getElementById('secondaryFieldLabel');
            const primaryInput = document.getElementById('newRecordKey');
            const secondaryInput = document.getElementById('newRecordValue');

            if (currentType === 'icd') {
                primaryLabel.textContent = "Diagnosis Code";
                secondaryLabel.textContent = "Diagnosis Description";
                primaryInput.placeholder = "e.g., J06.9";
                secondaryInput.placeholder = "e.g., UPPER RESPIRATORY TRACT INFECTION";
            } else if (currentType === 'member') {
                primaryLabel.textContent = "Membership Code";
                secondaryLabel.textContent = "Full Category Specifier";
                primaryInput.placeholder = "e.g., DIRECT";
                secondaryInput.placeholder = "e.g., CONTRIBUTOR - INDIVIDUAL PAYING";
            } else if (currentType === 'zipcode') {
                primaryLabel.textContent = "Zipcode";
                secondaryLabel.textContent = "Municipality Name";
                primaryInput.placeholder = "e.g., 9417";
                secondaryInput.placeholder = "e.g., ARAKAN";
            }
        };

        // Multi-use Administrative Inline Modification Launchers
        window.openInlineEdit = function(rowElement) {
            activeEditRow = rowElement;
            const type = rowElement.getAttribute('data-ref-type') === 'icd' ? 'icd' : 
                         (rowElement.closest('#member-section-group') ? 'member' : 'zipcode');
            
            document.getElementById('modalDisplayTitle').textContent = "EDIT REGISTRY RECORD";
            document.getElementById('modalTypeSelectorGroup').style.display = 'none';
            document.getElementById('modalTypeSelector').value = type;
            
            synchronizeModalInputs();
            
            const codeVal = rowElement.getAttribute('data-code');
            document.getElementById('newRecordKey').value = codeVal;
            document.getElementById('newRecordKey').disabled = true; 
            
            const dataVal = rowElement.getAttribute('data-val');
            document.getElementById('newRecordValue').value = type === 'icd' ? dataVal : dataVal.replace(`${codeVal} - `, '');
            
            toggleModal('addRecordModal', true);
        };

        window.deleteInlineRow = async function(rowElement) {
            if(confirm("Are you certain you want to destroy this reference record?")) {
                const type = rowElement.getAttribute('data-ref-type') === 'icd' ? 'icd' : 
                             (rowElement.closest('#member-section-group') ? 'member' : 'zipcode');
                const key = rowElement.getAttribute('data-code');
                const sanitizedKey = key.replace(/[.#$\[\]]/g, "_");

                try {
                    if (rtdb) {
                        await set(ref(rtdb, `clinical_references/${type}/${sanitizedKey}`), null);
                    }
                    if (db) {
                        await deleteDoc(doc(db, `registry_${type}`, key));
                    }
                } catch(e) { console.warn("Remote database target drop failed."); }
                
                rowElement.remove();
            }
        };

        // Synchronized Remote Persistence Layer Handling Additions & Updates
        window.pushRecordToDatabase = async function() {
            const type = document.getElementById('modalTypeSelector').value;
            const key = document.getElementById('newRecordKey').value.trim();
            const val = document.getElementById('newRecordValue').value.trim();

            if (!key || !val) return alert("Please specify all required data attributes.");

            const referencePayload = { code: key, description: val, syncedAt: Date.now() };
            const sanitizedKey = key.replace(/[.#$\[\]]/g, "_");

            try {
                if (rtdb) {
                    await set(ref(rtdb, `clinical_references/${type}/${sanitizedKey}`), referencePayload);
                }
                if (db) {
                    await setDoc(doc(db, `registry_${type}`, key), referencePayload);
                }
            } catch (err) { console.warn("Storage runtime write operations captured locally."); }

            if (activeEditRow) {
                activeEditRow.setAttribute('data-val', type === 'icd' ? val : `${key} - ${val}`);
                activeEditRow.querySelector('.item-desc-text').textContent = val;
            } else {
                const sectionMap = { icd: 'icd-section-group', member: 'member-section-group', zipcode: 'zip-section-group' };
                const targetNode = document.getElementById(sectionMap[type]);
                if (targetNode) {
                    appendRowToDOM(targetNode, type, key, val);
                }
            }

            toggleModal('addRecordModal', false);
            activeEditRow = null;
            document.getElementById('newRecordKey').value = "";
            document.getElementById('newRecordKey').disabled = false;
            document.getElementById('newRecordValue').value = "";
            if (window.lucide) window.lucide.createIcons();
        };

        // Reordering UI/UX Drag States Engine
        window.toggleMovableLayout = function() {
            layoutMovableActive = !layoutMovableActive;
            const container = document.getElementById('mainContainer');
            const triggerBtn = document.getElementById('sortToggleTrigger');

            if (layoutMovableActive) {
                container.classList.add('edit-mode-active');
                triggerBtn.classList.add('active-mode');
            } else {
                container.classList.remove('edit-mode-active');
                triggerBtn.classList.remove('active-mode');
            }
        };

        function bindDragDropSequence(element) {
            element.setAttribute('draggable', 'true');
            element.addEventListener('dragstart', () => { if(layoutMovableActive) element.classList.add('dragging'); });
            element.addEventListener('dragend', () => element.classList.remove('dragging'));
        }

        document.querySelectorAll('#icd-section-group, #member-section-group, #zip-section-group').forEach(zone => {
            zone.addEventListener('dragover', e => {
                if (!layoutMovableActive) return;
                e.preventDefault();
                const activeDragging = document.querySelector('.dragging');
                if (activeDragging) {
                    const boundingElement = getDragLocationSpace(zone, e.clientY);
                    if (boundingElement == null) {
                        zone.appendChild(activeDragging);
                    } else {
                        zone.insertBefore(activeDragging, boundingElement);
                    }
                }
            });
        });

        function getDragLocationSpace(container, yPoint) {
            const elements = [...container.querySelectorAll('.item-row:not(.dragging)')];
            return elements.reduce((closest, child) => {
                const boundary = child.getBoundingClientRect();
                const separation = yPoint - boundary.top - boundary.height / 2;
                if (separation < 0 && separation > closest.offset) {
                    return { offset: separation, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        // Global Window Modal Operations
        window.toggleModal = function(id, isActive) {
            const overlay = document.getElementById(id);
            if (overlay) {
                if (isActive) {
                    overlay.style.display = 'flex';
                    setTimeout(() => overlay.classList.add('active'), 10);
                } else {
                    overlay.classList.remove('active');
                    setTimeout(() => {
                        overlay.style.display = 'none';
                        document.getElementById('modalDisplayTitle').textContent = "ADD NEW REFERENCE";
                        document.getElementById('modalTypeSelectorGroup').style.display = 'block';
                        document.getElementById('newRecordKey').disabled = false;
                        activeEditRow = null;
                    }, 220);
                }
            }
        };

        window.closeOutside = function(e, id) {
            if (e.target === document.getElementById(id)) toggleModal(id, false);
        };

        window.resetViewRegistry = function() {
            document.getElementById('registrySearch').value = "";
            filterRegistryRealtime();
            if (layoutMovableActive) toggleMovableLayout();
        };

        document.addEventListener('DOMContentLoaded', () => {
            initializeRegistryData();
        });
    </script>
</body>
</html>
