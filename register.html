<div class="container">
    <h2>CREATE ACCOUNT</h2>
    <form id="regForm">
        <div class="input-group">
            <label>FULL NAME</label>
            <input type="text" id="regName" required placeholder="John Doe">
        </div>
        <div class="input-group">
            <label>USERNAME</label>
            <input type="text" id="regUser" required placeholder="johndoe123">
        </div>
        <div class="input-group">
            <label>PASSWORD</label>
            <input type="password" id="regPass" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-submit">REGISTER</button>
    </form>
    <div class="msg" id="regMsg"></div>
    <a href="login.html" class="link-text">Already have an account? Login</a></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDaeNQF4qmW0vvwxUPp_NztnT0hoLzm1BQ",
        authDomain: "svls-289ee.firebaseapp.com",
        databaseURL: "https://svls-289ee-default-rtdb.firebaseio.com",
        projectId: "svls-289ee",
        storageBucket: "svls-289ee.firebasestorage.app",
        messagingSenderId: "500705386198",
        appId: "1:500705386198:web:96f189662bc2aa99cf7377",
        measurementId: "G-5TNBMQ2HN5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('regName').value.trim();
        const username = document.getElementById('regUser').value.trim().toLowerCase();
        const password = document.getElementById('regPass').value;
        const msg = document.getElementById('regMsg');

        try {
            const accountsRef = collection(db, "accounts");
                        
            // Check uniqueness
            const qUser = query(accountsRef, where("username", "==", username));
            const querySnap = await getDocs(qUser);
            if (!querySnap.empty) {
                msg.style.color = "#ef4444";
                msg.innerText = "Username already taken.";
                return;
            }

            // Determine if first account
            const allSnap = await getDocs(accountsRef);
            const isFirst = allSnap.empty;

            await addDoc(accountsRef, {
                name: name,
                username: username,
                password: password, // Note: In production systems, passwords should be encrypted
                role: isFirst ? "admin" : "user",
                status: isFirst ? "approved" : "pending"
            });

            msg.style.color = "#ffee00";
            msg.innerText = isFirst ? "Admin registered! Redirecting..." : "Registration submitted! Awaiting admin approval.";
            setTimeout(() => window.location.href = "login.html", 2500);

        } catch (err) {
            msg.style.color = "#ef4444";
            msg.innerText = "Error: " + err.message;
        }
    });
</script>
</body></html>
