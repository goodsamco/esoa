<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACCOUNT SETTINGS — SALARY COMPUTER</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* ==========================================================================
           1. DESIGN TOKENS & SYSTEM VARIABLES (DYNAMIC COLOR BINDING)
           ========================================================================== */
        :root {
            --bg: #111111;
            --surface: #1b1b1b;
            --primary: #e5e5e5; /* Dynamically replaced by script if user has custom accent */
            --success: #fbff00;
            --text-main: #fafafa;
            --glass: rgba(255, 255, 255, 0.08);
            --modal-bg: rgba(17, 17, 17, 0.98);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 10px 10vh 10px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* ==========================================================================
           2. CORE LAYOUT CONTAINER
           ========================================================================== */
        .container {
            position: relative;
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 24px;
            box-sizing: border-box;
        }

        .header-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .back-btn {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: var(--primary);
            color: #000;
        }

        h1 {
            font-size: 0.8rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin: 0;
            font-weight: 800;
        }

        /* ==========================================================================
           3. CURRENT PROFILE BANNER (IDENTITY RECOGNITION)
           ========================================================================== */
        .profile-identity-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 24px;
        }

        .profile-avatar-wrapper {
            position: relative;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--primary);
            overflow: hidden;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .profile-avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-meta-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .profile-meta-info .user-name {
            font-size: 0.85rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--text-main);
            letter-spacing: 0.05em;
        }

        .profile-meta-info .user-role {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--primary);
            letter-spacing: 0.08em;
            opacity: 0.8;
        }

        /* ==========================================================================
           4. FORM CONFIGURATION INTERFACE
           ========================================================================== */
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.65rem;
            color: var(--primary);
            margin-left: 6px;
            margin-bottom: 6px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .form-group input[type="text"],
        .form-group input[type="time"],
        .form-group input[type="number"],
        .form-group select {
            width: 100%;
            background: #000000;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 12px 14px;
            border-radius: 12px;
            color: white;
            font-size: 0.9rem;
            box-sizing: border-box;
            font-weight: 600;
            outline: none;
            text-transform: uppercase; /* FORCED GLOBAL VALUE STRUCTURE UPPERCASE */
            transition: border-color 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary);
        }

        /* Dedicated Full Row Layout Highlight for Daily Rate */
        .daily-rate-row {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        /* Day Selection Matrix */
        .day-matrix {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 6px;
        }

        .day-chip {
            position: relative;
        }

        .day-chip input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .day-chip label {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000000;
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 10px 0;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            margin: 0;
            text-align: center;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .day-chip input[type="checkbox"]:checked + label {
            background: var(--primary);
            color: #000000;
            border-color: var(--primary);
            font-weight: 800;
        }

        /* Cleaned Up Structural Layout Checkbox Container Alignment */
        .checkbox-container-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.15);
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            margin-top: 8px;
        }

        .checkbox-container-row input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            background-color: #000000;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 9px;
            border-radius: 6px;
            display: inline-block;
            position: relative;
            cursor: pointer;
            outline: none;
        }

        .checkbox-container-row input[type="checkbox"]:checked {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .checkbox-container-row input[type="checkbox"]:checked:after {
            content: '\2714';
            font-size: 11px;
            position: absolute;
            top: 2px;
            left: 3px;
            color: #000000;
        }

        .checkbox-container-row span {
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        /* Action Buttons */
        .action-btn {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 25px;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background-color: var(--primary);
            color: #000;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .action-btn:hover {
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-nav">
            <button class="back-btn" onclick="window.location.href='payslip.html'" title="BACK TO PAYSLIP">
                <i data-lucide="arrow-left" style="width:16px;height:16px;"></i>
            </button>
            <h1>PROFILE CONFIGURATION</h1>
            <div style="width:36px;"></div>
        </div>

        <div class="profile-identity-card">
            <div class="profile-avatar-wrapper">
                <img id="userDisplayAvatar" src="https://via.placeholder.com/150" alt="PROFILE PIC">
            </div>
            <div class="profile-meta-info">
                <div class="user-name" id="userDisplayName">LOADING IDENTITY...</div>
                <div class="user-role" id="userDisplayRole">AUTHENTICATED EMPLOYEE</div>
            </div>
        </div>

        <form id="settingsForm" onsubmit="event.preventDefault();">
            <div class="form-group">
                <label>LAST NAME</label>
                <input type="text" id="lastName" placeholder="E.G. AUTAJAY" required autocomplete="off">
            </div>

            <div class="form-group">
                <label>FIRST NAME</label>
                <input type="text" id="firstName" placeholder="E.G. DZEY" required autocomplete="off">
            </div>

            <div class="form-group">
                <label>MIDDLE INITIAL</label>
                <input type="text" id="middleInitial" placeholder="E.G. A" maxlength="2" autocomplete="off">
            </div>

            <div class="daily-rate-row">
                <div class="form-group" style="margin-bottom: 0;">
                    <label style="color: var(--text-main)">DAILY RATE VALUE (₱)</label>
                    <input type="number" id="dailyRate" placeholder="460.00" step="0.01" required autocomplete="off" style="border-color: rgba(255,255,255,0.35);">
                </div>
            </div>

            <div class="form-group">
                <label>POSITION</label>
                <input type="text" id="position" placeholder="E.G. SYSTEM ADMINISTRATOR" required autocomplete="off">
            </div>

            <div class="form-group">
                <label>DEPARTMENT</label>
                <select id="departmentSelect" onchange="toggleDeptCustom(this.value)">
                    <option value="Admin">ADMIN</option>
                    <option value="Finance">FINANCE</option>
                    <option value="Custom">OTHER (TYPE CUSTOM)</option>
                </select>
                <input type="text" id="departmentCustom" placeholder="TYPE DEPARTMENT NAME" style="display:none; margin-top:8px;" autocomplete="off">
            </div>

            <div class="form-group">
                <label>SCHEDULE OF DUTIES</label>
                <div class="day-matrix">
                    <div class="day-chip"><input type="checkbox" id="day-Mon" value="Monday"><label for="day-Mon">MON</label></div>
                    <div class="day-chip"><input type="checkbox" id="day-Tue" value="Tuesday"><label for="day-Tue">TUE</label></div>
                    <div class="day-chip"><input type="checkbox" id="day-Wed" value="Wednesday"><label for="day-Wed">WED</label></div>
                    <div class="day-chip"><input type="checkbox" id="day-Thu" value="Thursday"><label for="day-Thu">THU</label></div>
                    <div class="day-chip"><input type="checkbox" id="day-Fri" value="Friday"><label for="day-Fri">FRI</label></div>
                    <div class="day-chip"><input type="checkbox" id="day-Sat" value="Saturday"><label for="day-Sat">SAT</label></div>
                    <div class="day-chip"><input type="checkbox" id="day-Sun" value="Sunday"><label for="day-Sun">SUN</label></div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap:12px;">
                <div class="form-group">
                    <label>TIME IN</label>
                    <input type="time" id="timeIn" value="08:00" required>
                </div>
                <div class="form-group">
                    <label>TIME OUT</label>
                    <input type="time" id="timeOut" value="17:00" required>
                </div>
            </div>

            <div class="form-group">
                <label>REST PERIOD INTERMISSION</label>
                <label class="checkbox-container-row" for="hasLunchBreak">
                    <input type="checkbox" id="hasLunchBreak" checked>
                    <span>INCLUDE LUNCH BREAK SCHEDULE (12:00 PM — 1:00 PM)</span>
                </label>
            </div>

            <button type="button" class="action-btn" id="saveBtn" onclick="saveSystemSettings()">SAVE CONFIGURATIONS</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDaeNQF4qmW0vvwxUPp_NztnT0hoLzm1BQ",
            authDomain: "svls-289ee.firebaseapp.com",
            databaseURL: "https://svls-289ee-default-rtdb.firebaseio.com",
            projectId: "svls-289ee",
            storageBucket: "svls-289ee.firebasestorage.app",
            messagingSenderId: "500705386198",
            appId: "1:500705386198:web:96f189662bc2aa99cf7377",
            measurementId: "G-5TNBMQ2HN5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Fetch user context from global scope
        const userId = localStorage.getItem("userId") || "test_user_node";

        window.toggleDeptCustom = function(value) {
            const customInput = document.getElementById('departmentCustom');
            if (value === 'Custom') {
                customInput.style.display = 'block';
                customInput.setAttribute('required', 'true');
            } else {
                customInput.style.display = 'none';
                customInput.removeAttribute('required');
            }
        };

        // Real-time theme loading from user account structure
        async function fetchIdentityAndSettings() {
            try {
                // First read user config details for names & colors
                const accountRef = doc(db, "users", userId);
                const accountSnap = await getDoc(accountRef);

                if (accountSnap.exists()) {
                    const accountData = accountSnap.data();
                    
                    // Display User identity
                    const fullName = `${accountData.lastName || ''}, ${accountData.firstName || ''}`.toUpperCase();
                    document.getElementById('userDisplayName').innerText = fullName.replace(/^, /, '') || 'ANONYMOUS USER';
                    if (accountData.role) {
                        document.getElementById('userDisplayRole').innerText = accountData.role.toUpperCase();
                    }
                    if (accountData.avatar) {
                        document.getElementById('userDisplayAvatar').src = accountData.avatar;
                    }

                    // Dynamically set Global variable accent color if stored in account
                    if (accountData.themeColor || accountData.color) {
                        const targetColor = accountData.themeColor || accountData.color;
                        document.documentElement.style.setProperty('--primary', targetColor);
                    }
                }

                // Populate operational settings document definitions
                const settingsRef = doc(db, "salary_settings", userId);
                const settingsSnap = await getDoc(settingsRef);

                if (settingsSnap.exists()) {
                    const data = settingsSnap.data();
                    document.getElementById('lastName').value = (data.lastName || '').toUpperCase();
                    document.getElementById('firstName').value = (data.firstName || '').toUpperCase();
                    document.getElementById('middleInitial').value = (data.middleInitial || '').toUpperCase();
                    document.getElementById('dailyRate').value = data.dailyRate || '';
                    document.getElementById('position').value = (data.position || '').toUpperCase();
                    document.getElementById('timeIn').value = data.timeIn || '08:00';
                    document.getElementById('timeOut').value = data.timeOut || '17:00';
                    document.getElementById('hasLunchBreak').checked = data.hasLunchBreak !== false;

                    if (data.department === 'Admin' || data.department === 'Finance') {
                        document.getElementById('departmentSelect').value = data.department;
                    } else if (data.department) {
                        document.getElementById('departmentSelect').value = 'Custom';
                        toggleDeptCustom('Custom');
                        document.getElementById('departmentCustom').value = data.department.toUpperCase();
                    }

                    if (data.dutyDays && Array.isArray(data.dutyDays)) {
                        data.dutyDays.forEach(day => {
                            const chip = document.querySelector(`.day-chip input[value="${day}"]`);
                            if (chip) chip.checked = true;
                        });
                    }
                    document.getElementById('saveBtn').innerText = "UPDATE CONFIGURATIONS";
                }
            } catch (err) {
                console.error("Errors resolving accounts dataset properties:", err);
            }
        }

        window.saveSystemSettings = async function() {
            const deptSelect = document.getElementById('departmentSelect').value;
            const finalDept = deptSelect === 'Custom' ? document.getElementById('departmentCustom').value.trim() : deptSelect;

            const selectedDays = [];
            document.querySelectorAll('.day-matrix input[type="checkbox"]:checked').forEach(cb => {
                selectedDays.push(cb.value);
            });

            const payload = {
                lastName: document.getElementById('lastName').value.trim().toUpperCase(),
                firstName: document.getElementById('firstName').value.trim().toUpperCase(),
                middleInitial: document.getElementById('middleInitial').value.trim().toUpperCase(),
                dailyRate: parseFloat(document.getElementById('dailyRate').value) || 0,
                position: document.getElementById('position').value.trim().toUpperCase(),
                department: finalDept.toUpperCase(),
                dutyDays: selectedDays,
                timeIn: document.getElementById('timeIn').value,
                timeOut: document.getElementById('timeOut').value,
                hasLunchBreak: document.getElementById('hasLunchBreak').checked,
                updatedAt: Date.now()
            };

            try {
                await setDoc(doc(db, "salary_settings", userId), payload, { merge: true });
                alert("PROFILE SETTINGS ACCURATELY SYNCED SUCCESSFULLY.");
                window.location.href = "payslip.html";
            } catch (error) {
                console.error("Error committing records down to Firestore:", error);
                alert("FAILED TRANSACTION SYNCHRONIZATION.");
            }
        };

        if (window.lucide) window.lucide.createIcons();
        fetchIdentityAndSettings();
    </script>
</body>
</html>
