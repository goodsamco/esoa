<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSOA - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
      :root {
    --bg: #1a0f0b;
    --surface: #140700;
    --primary: #ff7300;
    --success: #f97316;
    --text-main: #fff7ed;
    --glass: rgba(255, 115, 0, 0.15);
    --modal-bg: rgba(20, 7, 0, 0.98);
}

::-webkit-scrollbar {
    width: 8px;
}

::-webkit-scrollbar-track {
    background: var(--bg);
}

::-webkit-scrollbar-thumb {
    background: #331a10;
    border-radius: 10px;
}

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg);
    color: var(--text-main);
    margin: 0;
    padding: 210px 10px 25vh 10px; /* Increased top padding slightly to clear the taller header stack layout cleanly */
    display: flex;
    justify-content: center;
    overflow-x: hidden;
    transition: background-color 0.3s ease;
}

body.copy-flash {
    background-color: var(--primary);
}

/* Transparent Horizontal Peer Node Row overlayed directly over body context */
.peer-wrapper-row {
    position: fixed;
    top: 20px; 
    left: 20px;
    right: 20px;
    height: 110px; /* Taller container to show names below 70px bubbles */
    display: flex;
    align-items: center; /* Centers navigation arrows vertically relative to the row content */
    gap: 8px;
    z-index: 3100;
}

.peer-active-hub {
    display: flex;
    gap: 12px;
    align-items: center;
    flex: 1;
    overflow-x: auto;
    white-space: nowrap;
    padding: 4px 4px 35px 4px; /* Bottom padding ensures absolutely positioned hover name doesn't clip */
    scroll-behavior: smooth;
    scrollbar-width: none;
    -ms-overflow-style: none;
}

.peer-active-hub::-webkit-scrollbar {
    display: none;
}

/* Integrated Nav Controls Transparent Over Background - Centered vertically on bubble row line */
.scroll-nav-btn {
    background: rgba(20, 7, 0, 0.6);
    border: 1px solid rgba(255, 115, 0, 0.2);
    color: var(--primary);
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 3110;
    transition: all 0.2s ease;
    backdrop-filter: blur(10px);
    flex-shrink: 0;
    margin-top: -31px; /* Visual offsetting to accurately center alignment directly to the 70px/38px content fields instead of layout container base */
}

.scroll-nav-btn:hover {
    background: var(--primary);
    color: #000;
}

.peer-wrapper {
    position: relative;
    display: inline-flex;
    align-items: center;
    flex-shrink: 0;
}

/* User Bubble scaled up to 70px */
.peer-avatar-bubble {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    object-fit: cover;
    background: radial-gradient(circle, #2e3b4e 0%, #1e293b 100%);
    border: 2px solid #666;
    cursor: pointer;
    transition: all 0.2s ease;
}

.peer-avatar-bubble:hover {
    border-color: var(--primary);
    transform: scale(1.05);
}

/* Group Chat Bubble layout explicitly retained small */
.group-chat-bubble {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--primary);
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 2px solid var(--primary);
    transition: all 0.2s ease;
    box-shadow: 0 0 8px rgba(255, 115, 0, 0.4);
    flex-shrink: 0;
}

.group-chat-bubble:hover {
    transform: scale(1.05);
    background: #fff;
    border-color: #fff;
}

/* Notification Dot overlay on sender avatar */
.peer-notif-dot {
    position: absolute;
    top: -2px;
    right: -2px;
    width: 12px;
    height: 12px;
    background-color: var(--primary);
    border: 2px solid var(--surface);
    border-radius: 50%;
    display: none;
    z-index: 3010;
    box-shadow: 0 0 8px var(--primary);
}

.peer-wrapper.has-unread .peer-notif-dot {
    display: block;
}

/* Hover dynamic name tags layout */
.peer-name-hover {
    position: absolute;
    left: 50%;
    bottom: -28px; 
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--glass);
    padding: 4px 8px;
    border-radius: 6px;
    font-size: 0.7rem;
    font-weight: 600;
    color: white;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
}

.peer-wrapper:hover .peer-name-hover {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}

/* Profile identity deck element - shifted lower down to clear layout overflow comfortably */
.top-nav {
    position: fixed;
    top: 140px; /* Lowered from 100px to offer a clean, elegant spacing underneath the taller peer rows */
    right: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 3000;
    background: rgba(20, 7, 0, 0.4);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 6px 10px;
    border-radius: 20px;
    border: 1px solid var(--glass);
}

.top-btn {
    width: 38px;
    height: 38px;
    background: var(--surface);
    border: 1px solid rgba(255, 115, 0, 0.2);
    border-radius: 14px;
    color: white;
    backdrop-filter: blur(10px);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.top-btn:hover {
    background: var(--primary);
    color: #000;
    transform: translateY(-2px);
}

.user-identity-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-left: 6px;
}

.profile-avatar-node {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    object-fit: cover;
    background: radial-gradient(circle, #2e3b4e 0%, #1e293b 100%);
    border: 2px solid var(--primary);
    padding: 2px;
    cursor: pointer;
    transition: transform 0.2s ease;
}

.profile-avatar-node:hover {
    transform: scale(1.05);
}

.user-identity-card .name-string {
    font-size: 0.65rem;
    font-weight: 800;
    color: var(--text-main);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    max-width: 75px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

/* Real-time Session Dock Panel Styles */
.chat-docking-panel {
    position: fixed;
    bottom: 26vh;
    right: 20px;
    width: 340px;
    height: 440px;
    background: var(--modal-bg);
    border: 1px solid var(--glass);
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
    display: none;
    flex-direction: column;
    z-index: 3500;
    overflow: hidden;
}

.chat-header-bar {
    background: rgba(0, 0, 0, 0.4);
    padding: 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--glass);
}

.chat-header-bar span {
    font-size: 0.8rem;
    font-weight: 800;
    color: var(--primary);
    text-transform: uppercase;
}

.chat-close-trigger {
    background: transparent;
    border: none;
    color: #666;
    cursor: pointer;
}

.chat-scroller-view {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
}

.msg-wrapper {
    display: flex;
    flex-direction: column;
    max-width: 85%;
    position: relative;
}

.msg-wrapper.incoming {
    align-self: flex-start;
}

.msg-wrapper.outgoing {
    align-self: flex-end;
    align-items: flex-end;
}

.msg-meta-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
}

.msg-wrapper.outgoing .msg-meta-row {
    flex-direction: row-reverse;
}

.msg-gc-avatar {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    object-fit: cover;
    border: 1px solid var(--primary);
}

.msg-author-tag {
    font-size: 0.65rem;
    color: #aaa;
    font-weight: 700;
}

.msg-time-tag {
    font-size: 0.6rem;
    color: #666;
    font-weight: 400;
}

.msg-bubble {
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 0.85rem;
    word-wrap: break-word;
    position: relative;
    cursor: pointer;
    user-select: none;
}

.msg-bubble.incoming {
    background: rgba(255, 255, 255, 0.06);
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.05);
}

.msg-bubble.outgoing {
    background: var(--primary);
    color: #000;
    font-weight: 600;
}

.msg-reaction-container {
    display: flex;
    gap: 4px;
    margin-top: -4px;
    z-index: 10;
    background: #140700;
    border: 1px solid rgba(255, 115, 0, 0.3);
    padding: 2px 6px;
    border-radius: 10px;
    font-size: 0.7rem;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.5);
    align-items: center;
}

.reaction-pill {
    display: flex;
    align-items: center;
    gap: 2px;
    cursor: pointer;
}

.reaction-pill.user-voted {
    background: rgba(255, 115, 0, 0.2);
    border-radius: 4px;
    padding: 0 2px;
}

.reaction-count {
    font-size: 0.65rem;
    font-weight: 800;
    color: var(--primary);
}

.reaction-picker-tray {
    position: absolute;
    background: #1c0d07;
    border: 1px solid var(--primary);
    padding: 4px 8px;
    border-radius: 20px;
    display: flex;
    gap: 6px;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
    z-index: 4000;
    top: -35px;
}

.msg-wrapper.incoming .reaction-picker-tray {
    left: 0;
}

.msg-wrapper.outgoing .reaction-picker-tray {
    right: 0;
}

.reaction-option {
    cursor: pointer;
    font-size: 1.1rem;
    transition: transform 0.1s ease;
}

.reaction-option:hover {
    transform: scale(1.25);
}

.chat-input-row {
    padding: 10px;
    display: flex;
    gap: 8px;
    background: rgba(0, 0, 0, 0.5);
}

.chat-input-row input {
    flex: 1;
    background: #000;
    border: 1px solid rgba(255, 115, 0, 0.2);
    border-radius: 8px;
    color: white;
    padding: 8px;
    font-size: 0.85rem;
    outline: none;
}

.chat-input-row input:focus {
    border-color: var(--primary);
}

.chat-input-row button {
    background: var(--primary);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 0 14px;
    font-weight: 800;
    cursor: pointer;
}

.container {
    position: relative;
    width: 100%;
    max-width: 400px;
    background: var(--surface);
    padding: 20px;
    border-radius: 24px;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
    border: 1px solid rgba(255, 115, 0, 0.1);
}

#highlighter {
    position: absolute;
    left: 8px;
    right: 8px;
    border: 2px solid var(--primary);
    background-color: var(--glass);
    border-radius: 12px;
    pointer-events: none;
    transition: all 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    z-index: 1;
    opacity: 0;
}

h2 {
    font-size: 0.7rem;
    color: var(--primary);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin: 30px 0 10px 10px;
    opacity: 0.6;
}

.item-row {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px;
    margin: 4px 0;
    cursor: pointer;
    border-radius: 12px;
    transition: all 0.3s ease;
}

.item-row:hover {
    background: rgba(255, 255, 255, 0.03);
}

.text-content {
    font-size: 0.95rem;
    font-weight: 500;
}

.text-active {
    color: var(--primary);
    text-shadow: 0 0 12px var(--primary);
}

.add-btn-circle {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(255, 115, 0, 0.05);
    border: 1px dashed var(--primary);
    color: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    margin: 10px 0 20px 10px;
    transition: all 0.2s ease;
}

.add-btn-circle:hover {
    background: var(--primary);
    color: #000;
    transform: scale(1.1);
}

.bottom-zone {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 25vh;
    z-index: 2000;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
}

.btn-main-copy {
    width: 160px;
    height: 70px;
    border: none;
    border-radius: 18px;
    font-weight: 800;
    font-size: 1rem;
    text-transform: uppercase;
    letter-spacing: 2px;
    position: relative;
    overflow: hidden;
    background-color: var(--primary);
    color: #000;
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    pointer-events: none;
    background-image: url('https://sklepagatesting.github.io/resources/Images/mclaren.png');
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    filter: drop-shadow(0 0 12px rgba(255, 115, 0, 0.65));
}

.bottom-zone:hover .btn-main-copy:not(.success-state) {
    width: 250px;
    height: 120px;
}

.btn-main-copy.success-state {
    background-image: none !important;
    background-color: var(--primary) !important;
    color: #000;
    text-shadow: none;
    box-shadow: 0 0 25px rgba(255, 115, 0, 0.5);
    border-radius: 35px;
}

@keyframes idleFloat {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(0, -5px); }
}

.btn-main-copy.idle {
    animation: idleFloat 3.5s ease-in-out infinite;
}

.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0);
    backdrop-filter: blur(0px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 4000;
    transition: all 0.3s ease;
}

.modal-overlay.active {
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(4px);
}

.modal-content {
    background: var(--modal-bg);
    width: 90%;
    max-width: 380px;
    padding: 40px 30px;
    border-radius: 32px;
    border: 1px solid var(--glass);
    position: relative;
    text-align: center;
    opacity: 0;
    transform: scale(0.6) translateY(40px);
    filter: blur(15px);
    transition: all 0.35s cubic-bezier(0.15, 1, 0.3, 1.1);
    max-height: 80vh;
    overflow-y: auto;
}

.modal-overlay.active .modal-content {
    opacity: 1;
    transform: scale(1) translateY(0);
    filter: blur(0px);
}

.list-item {
    padding: 16px;
    margin: 8px 0;
    border-radius: 16px;
    text-align: left;
    cursor: pointer;
    transition: 0.2s;
    color: var(--text-main);
    background: rgba(255, 115, 0, 0.02);
    border: 1px solid rgba(255, 115, 0, 0.05);
}

.list-item:hover {
    background: var(--glass);
    border-color: var(--primary);
    color: #fff;
}

.input-group {
    margin-bottom: 15px;
    text-align: left;
}

.input-group label {
    font-size: 0.65rem;
    color: var(--primary);
    margin-left: 10px;
    font-weight: 800;
}

.modal-content input {
    width: 100%;
    background: #000;
    border: 1px solid rgba(255, 115, 0, 0.2);
    padding: 16px;
    margin-top: 5px;
    border-radius: 16px;
    color: white;
    font-size: 1.3rem;
    box-sizing: border-box;
    text-align: center;
    font-weight: 700;
    outline: none;
}

.modal-content input:focus {
    border-color: var(--primary);
}

.modal-result {
    margin: 25px 0;
    padding: 20px;
    background: var(--glass);
    border-radius: 20px;
    border: 1px dashed var(--primary);
}

#finalDiscount {
    font-size: 2.5rem;
    font-weight: 800;
    color: var(--primary);
}

.modal-copy-zone {
    height: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    background: var(--primary);
    color: #000;
    border-radius: 16px;
    font-weight: 800;
    transition: 0.2s;
}

.modal-copy-zone.success-state {
    background: var(--primary);
    color: #fff;
}

.modal-close-btn {
    margin-top: 20px;
    background: transparent;
    border: none;
    color: #666;
    cursor: pointer;
    font-size: 0.8rem;
    text-decoration: underline;
}
    </style>
</head>
<body>

<div class="container">
    <h2>Management Dashboard</h2>
    
    <div class="tabs">
        <button class="tab-btn active" id="btn-approvals">Approvals</button>
        <button class="tab-btn" id="btn-activity">Active & Access Control</button>
        <button class="tab-btn" id="btn-chats">Chat Monitor</button>
    </div>

    <div id="approvals" class="tab-content active">
        <div id="userList">Loading registrations...</div>
    </div>

    <div id="activity" class="tab-content">
        <div id="activeUserList">Loading accounts...</div>
    </div>

    <div id="chats" class="tab-content">
        <div id="chatLogsList">Loading live conversations...</div>
    </div>
</div>

<a href="login.html" class="logout-link" onclick="localStorage.clear()">Log out Management</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDaeNQF4qmW0vvwxUPp_NztnT0hoLzm1BQ",
        authDomain: "svls-289ee.firebaseapp.com",
        databaseURL: "https://svls-289ee-default-rtdb.firebaseio.com",
        projectId: "svls-289ee",
        storageBucket: "svls-289ee.firebasestorage.app",
        messagingSenderId: "500705386198",
        appId: "1:500705386198:web:96f189662bc2aa99cf7377",
        measurementId: "G-5TNBMQ2HN5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);

    if (localStorage.getItem("userRole") !== "admin") {
        window.location.href = "login.html";
    }

    // Local runtime cache memory lookup layout to map matching names effortlessly
    const cachedUserDirectory = {};

    // --- POPULATE AND SYNC ACCOUNT NAMES ---
    function syncUserDirectory() {
        const q = query(collection(db, "accounts"));
        onSnapshot(q, (snapshot) => {
            snapshot.forEach(uDoc => {
                const data = uDoc.data();
                cachedUserDirectory[uDoc.id] = data.customName || data.name || `@${data.username}`;
            });
        });
    }
    syncUserDirectory();

    // --- TAB 1: PENDING APPROVALS ---
    async function loadPendingUsers() {
        const container = document.getElementById('userList');
        container.innerHTML = "";
        try {
            const q = query(collection(db, "accounts"), where("status", "==", "pending"));
            const snapshot = await getDocs(q);

            if (snapshot.empty) {
                container.innerHTML = `<div class="empty-state">No accounts requiring attention right now.</div>`;
                return;
            }

            snapshot.forEach((userDoc) => {
                const data = userDoc.data();
                const card = document.createElement('div');
                card.className = "user-card";
                card.innerHTML = `
                    <div class="user-info">
                        <div class="name">${data.name || data.customName}</div>
                        <div class="username">@${data.username}</div>
                    </div>
                    <button class="btn btn-approve" data-id="${userDoc.id}">APPROVE</button>
                `;
                container.appendChild(card);
            });

            document.querySelectorAll('.btn-approve').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    await updateDoc(doc(db, "accounts", id), { status: "approved" });
                    loadPendingUsers();
                });
            });
        } catch (err) {
            container.innerHTML = `<div class="empty-state" style="color:var(--danger)">Error loading profiles.</div>`;
        }
    }

    // --- TAB 2: ACTIVE STATUS & ACCESS CONTROL ---
    function listenToUserActivity() {
        const container = document.getElementById('activeUserList');
        const q = query(collection(db, "accounts"), where("status", "!=", "pending"));

        onSnapshot(q, (snapshot) => {
            container.innerHTML = "";
            if (snapshot.empty) {
                container.innerHTML = `<div class="empty-state">No verified accounts found.</div>`;
                return;
            }

            snapshot.forEach((userDoc) => {
                const data = userDoc.data();
                const isOnline = data.isOnline === true; 
                const isEsoaDisabled = data.esoaDisabled === true;

                const card = document.createElement('div');
                card.className = "user-card";
                card.innerHTML = `
                    <div class="user-info">
                        <div class="name">
                            ${data.customName || data.name} 
                            <span class="status-badge ${isOnline ? 'active' : 'offline'}">${isOnline ? 'ONLINE' : 'OFFLINE'}</span>
                        </div>
                        <div class="username">@${data.username} ${isEsoaDisabled ? '<span style="color:var(--danger); font-size:0.75rem;">(eSOA Disabled)</span>' : ''}</div>
                    </div>
                    <button class="btn ${isEsoaDisabled ? 'btn-enable' : 'btn-disable'}" data-id="${userDoc.id}" data-disabled="${isEsoaDisabled}">
                        ${isEsoaDisabled ? 'Enable eSOA' : 'Disable eSOA'}
                    </button>
                `;
                container.appendChild(card);
            });

            container.querySelectorAll('.btn-disable, .btn-enable').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    const currentDisabledStatus = e.target.getAttribute('data-disabled') === 'true';
                    await updateDoc(doc(db, "accounts", id), { 
                        esoaDisabled: !currentDisabledStatus 
                    });
                });
            });
        });
    }

    // --- TAB 3: REALTIME DATABASE CHAT MONITOR ---
    function listenToRTDBChats() {
        const container = document.getElementById('chatLogsList');
        
        // Listen into RTDB structure configurations directly 
        const sessionsRef = ref(rtdb);
        
        onValue(sessionsRef, (snapshot) => {
            container.innerHTML = "";
            const masterData = snapshot.val() || {};
            
            const rawAggregatedMessages = [];

            // 1. Gather Group Chat Data
            if (masterData.group_chat && masterData.group_chat.messages) {
                Object.keys(masterData.group_chat.messages).forEach(mId => {
                    const item = masterData.group_chat.messages[mId];
                    rawAggregatedMessages.push({
                        sender: item.senderName || cachedUserDirectory[item.sender] || item.sender || "Unknown",
                        receiver: "👥 BARANGAY GROUP CHAT",
                        text: item.text,
                        timestamp: item.timestamp || 0
                    });
                });
            }

            // 2. Gather Private Sessions Data
            if (masterData.sessions) {
                Object.keys(masterData.sessions).forEach(sessionKey => {
                    const track = masterData.sessions[sessionKey];
                    Object.keys(track).forEach(mId => {
                        const item = track[mId];
                        // Ignore standard presence indicators or misaligned payload paths
                        if (!item.text) return; 
                        
                        // Parse composite room structural logic ids
                        const impliedIds = sessionKey.split('_');
                        const parsedSenderName = cachedUserDirectory[item.sender] || item.sender || "User";
                        
                        // Find target recipient ID out of combination array
                        const destinationId = impliedIds.find(id => id !== item.sender) || "User Partner";
                        const parsedReceiverName = cachedUserDirectory[destinationId] || destinationId;

                        rawAggregatedMessages.push({
                            sender: parsedSenderName,
                            receiver: `👤 ${parsedReceiverName}`,
                            text: item.text,
                            timestamp: item.timestamp || 0
                        });
                    });
                });
            }

            if (rawAggregatedMessages.length === 0) {
                container.innerHTML = `<div class="empty-state">No chat records detected over database feeds.</div>`;
                return;
            }

            // Sort chronologically (newest at the top)
            rawAggregatedMessages.sort((x, y) => y.timestamp - x.timestamp);

            // Display records sequentially 
            rawAggregatedMessages.forEach(msg => {
                const formattedTime = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Just now';
                const card = document.createElement('div');
                card.className = "chat-card";
                card.innerHTML = `
                    <div class="chat-meta">
                        <span><strong>${msg.sender}</strong> ➡️ <em>${msg.receiver}</em></span>
                        <span class="chat-time">${formattedTime}</span>
                    </div>
                    <div class="chat-msg">${msg.text}</div>
                `;
                container.appendChild(card);
            });
        });
    }

    // Tab Navigation Logic
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');
    };

    // Bind navigation triggers natively
    document.getElementById('btn-approvals').onclick = () => window.switchTab('approvals');
    document.getElementById('btn-activity').onclick = () => window.switchTab('activity');
    document.getElementById('btn-chats').onclick = () => window.switchTab('chats');

    // Initialize sequences
    window.onload = () => {
        loadPendingUsers();
        listenToUserActivity();
        listenToRTDBChats();
    };
</script>
