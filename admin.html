<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSOA - Admin Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a0f0b;
            --surface: #140700;
            --surface-card: rgba(255, 115, 0, 0.04);
            --primary: #ff7300;
            --success: #f97316;
            --danger: #ef4444;
            --text-main: #fff7ed;
            --text-muted: #a16207;
            --glass: rgba(255, 115, 0, 0.15);
            --border-glass: rgba(255, 115, 0, 0.1);
            --default-avatar: url('https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=150&q=80');
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: #331a10;
            border-radius: 10px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 40px 10px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--surface);
            padding: 25px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 115, 0, 0.1);
        }

        h2 {
            font-size: 1.1rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
            font-weight: 800;
        }

        /* Tabs Navigation */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px;
            border-radius: 14px;
            border: 1px solid var(--border-glass);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #8a7a73;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
            flex: 1;
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn.active {
            background: rgba(255, 115, 0, 0.15);
            color: var(--primary);
            border: 1px solid rgba(255, 115, 0, 0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .chat-monitor-viewport {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* User Identity List Cards */
        .user-card {
            background: var(--surface-card);
            border: 1px solid var(--border-glass);
            padding: 16px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .identity-block {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .avatar-node {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255, 115, 0, 0.2);
            flex-shrink: 0;
            background-image: var(--default-avatar);
        }

        .user-info {
            text-align: left;
        }

        .user-info .name {
            font-weight: 700;
            font-size: 0.95rem;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-info .username {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .status-badge {
            font-size: 0.65rem;
            padding: 2px 6px;
            border-radius: 8px;
            font-weight: 800;
        }

        .status-badge.active {
            background: rgba(249, 115, 22, 0.15);
            color: #fdba74;
        }

        .status-badge.offline {
            background: rgba(255, 255, 255, 0.05);
            color: #78716c;
        }

        /* Control UI Actions */
        .btn {
            color: #000;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: scale(1.02);
        }

        .btn-approve {
            background: var(--primary);
        }

        .btn-disable {
            background: #b45309;
            color: #fff;
        }

        .btn-enable {
            background: #c2410c;
            color: #fff;
        }

        /* Chat Log Monitor Component Layouts */
        .chat-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-glass);
            padding: 14px;
            border-radius: 16px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .chat-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: #d97706;
        }

        .chat-msg {
            font-size: 0.9rem;
            color: var(--text-main);
            line-height: 1.4;
            word-break: break-word;
            text-align: left;
        }

        .chat-time {
            font-size: 0.7rem;
            color: #78350f;
        }

        .empty-state {
            text-align: center;
            color: #78716c;
            padding: 40px 0;
            font-size: 0.9rem;
        }

        .logout-link {
            display: block;
            text-align: center;
            margin-top: 25px;
            color: #78716c;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .logout-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Management Dashboard</h2>
    
    <div class="tabs">
        <button class="tab-btn active" id="btn-approvals">Approvals</button>
        <button class="tab-btn" id="btn-activity">Active & Access Control</button>
        <button class="tab-btn" id="btn-chats">Chat Monitor</button>
    </div>

    <div id="approvals" class="tab-content active">
        <div id="userList" class="chat-monitor-viewport">Loading registrations...</div>
    </div>

    <div id="activity" class="tab-content">
        <div id="activeUserList" class="chat-monitor-viewport">Loading accounts...</div>
    </div>

    <div id="chats" class="tab-content">
        <div id="chatLogsList" class="chat-monitor-viewport">Loading live conversations...</div>
    </div>
</div>

<a href="login.html" class="logout-link" onclick="localStorage.clear()">Log out Management</a>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDaeNQF4qmW0vvwxUPp_NztnT0hoLzm1BQ",
        authDomain: "svls-289ee.firebaseapp.com",
        databaseURL: "https://svls-289ee-default-rtdb.firebaseio.com",
        projectId: "svls-289ee",
        storageBucket: "svls-289ee.firebasestorage.app",
        messagingSenderId: "500705386198",
        appId: "1:500705386198:web:96f189662bc2aa99cf7377",
        measurementId: "G-5TNBMQ2HN5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const rtdb = getDatabase(app);

    if (localStorage.getItem("userRole") !== "admin") {
        window.location.href = "login.html";
    }

    // Stores multi-property object blocks for full profile identification resolution
    const cachedUserDirectory = {};

    // --- POPULATE AND SYNC ACCOUNT IDENTITIES ---
    function syncUserDirectory() {
        const q = query(collection(db, "accounts"));
        onSnapshot(q, (snapshot) => {
            snapshot.forEach(uDoc => {
                const data = uDoc.data();
                cachedUserDirectory[uDoc.id] = {
                    displayName: data.customName || data.name || `@${data.username}`,
                    avatarUrl: data.avatarUrl || ""
                };
            });
        });
    }
    syncUserDirectory();

    // Helper to extract proper image property string blocks seamlessly
    function resolveAvatarStyle(urlStr) {
        if (!urlStr) return "";
        return `style="background-image: url('${urlStr}')"`;
    }

    // --- TAB 1: PENDING APPROVALS ---
    async function loadPendingUsers() {
        const container = document.getElementById('userList');
        container.innerHTML = "";
        try {
            const q = query(collection(db, "accounts"), where("status", "==", "pending"));
            const snapshot = await getDocs(q);

            if (snapshot.empty) {
                container.innerHTML = `<div class="empty-state">No accounts requiring attention right now.</div>`;
                return;
            }

            snapshot.forEach((userDoc) => {
                const data = userDoc.data();
                const avatarStyle = resolveAvatarStyle(data.avatarUrl);

                const card = document.createElement('div');
                card.className = "user-card";
                card.innerHTML = `
                    <div class="identity-block">
                        <div class="avatar-node" ${avatarStyle}></div>
                        <div class="user-info">
                            <div class="name">${data.name || data.customName}</div>
                            <div class="username">@${data.username}</div>
                        </div>
                    </div>
                    <button class="btn btn-approve" data-id="${userDoc.id}">APPROVE</button>
                `;
                container.appendChild(card);
            });

            document.querySelectorAll('#userList .btn-approve').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    await updateDoc(doc(db, "accounts", id), { status: "approved" });
                    loadPendingUsers();
                });
            });
        } catch (err) {
            container.innerHTML = `<div class="empty-state" style="color:var(--danger)">Error loading profiles.</div>`;
        }
    }

    // --- TAB 2: ACTIVE STATUS & ACCESS CONTROL ---
    function listenToUserActivity() {
        const container = document.getElementById('activeUserList');
        const q = query(collection(db, "accounts"), where("status", "!=", "pending"));

        onSnapshot(q, (snapshot) => {
            container.innerHTML = "";
            if (snapshot.empty) {
                container.innerHTML = `<div class="empty-state">No verified accounts found.</div>`;
                return;
            }

            snapshot.forEach((userDoc) => {
                const data = userDoc.data();
                const isOnline = data.isOnline === true; 
                const isEsoaDisabled = data.esoaDisabled === true;
                const avatarStyle = resolveAvatarStyle(data.avatarUrl);

                const card = document.createElement('div');
                card.className = "user-card";
                card.innerHTML = `
                    <div class="identity-block">
                        <div class="avatar-node" ${avatarStyle}></div>
                        <div class="user-info">
                            <div class="name">
                                ${data.customName || data.name} 
                                <span class="status-badge ${isOnline ? 'active' : 'offline'}">${isOnline ? 'ONLINE' : 'OFFLINE'}</span>
                            </div>
                            <div class="username">@${data.username} ${isEsoaDisabled ? '<span style="color:var(--danger); font-size:0.75rem;">(eSOA Disabled)</span>' : ''}</div>
                        </div>
                    </div>
                    <button class="btn ${isEsoaDisabled ? 'btn-enable' : 'btn-disable'}" data-id="${userDoc.id}" data-disabled="${isEsoaDisabled}">
                        ${isEsoaDisabled ? 'Enable eSOA' : 'Disable eSOA'}
                    </button>
                `;
                container.appendChild(card);
            });

            container.querySelectorAll('#activeUserList .btn-disable, #activeUserList .btn-enable').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    const currentDisabledStatus = e.target.getAttribute('data-disabled') === 'true';
                    await updateDoc(doc(db, "accounts", id), { 
                        esoaDisabled: !currentDisabledStatus 
                    });
                });
            });
        });
    }

    // --- TAB 3: REALTIME DATABASE CHAT MONITOR ---
    function listenToRTDBChats() {
        const container = document.getElementById('chatLogsList');
        const sessionsRef = ref(rtdb);

        onValue(sessionsRef, (snapshot) => {
            container.innerHTML = "";
            const masterData = snapshot.val() || {};
            const rawAggregatedMessages = [];

            // 1. Parse Group Chat Feed Data
            if (masterData.group_chat && masterData.group_chat.messages) {
                Object.keys(masterData.group_chat.messages).forEach(mId => {
                    const item = masterData.group_chat.messages[mId];
                    const cacheProfile = cachedUserDirectory[item.sender] || { displayName: item.senderName || item.sender || "Unknown", avatarUrl: "" };

                    rawAggregatedMessages.push({
                        senderName: cacheProfile.displayName,
                        senderAvatar: cacheProfile.avatarUrl,
                        receiverName: "👥 BARANGAY GROUP CHAT",
                        text: item.text,
                        timestamp: item.timestamp || 0
                    });
                });
            }

            // 2. Parse Private Session Room Node Keys Dynamically
            if (masterData.sessions) {
                Object.keys(masterData.sessions).forEach(sessionKey => {
                    const track = masterData.sessions[sessionKey];
                    Object.keys(track).forEach(mId => {
                        const item = track[mId];
                        if (!item.text) return; 

                        const impliedIds = sessionKey.split('_');
                        
                        // Look up sender data profile object
                        const senderProfile = cachedUserDirectory[item.sender] || { displayName: "User (" + item.sender.substring(0,5) + ")", avatarUrl: "" };
                        
                        // Extract alternative partner target participant key explicitly
                        const destinationId = impliedIds.find(id => id !== item.sender) || "Receiver Partner";
                        const receiverProfile = cachedUserDirectory[destinationId] || { displayName: "User (" + destinationId.substring(0,5) + ")", avatarUrl: "" };

                        rawAggregatedMessages.push({
                            senderName: senderProfile.displayName,
                            senderAvatar: senderProfile.avatarUrl,
                            receiverName: `👤 ${receiverProfile.displayName}`,
                            text: item.text,
                            timestamp: item.timestamp || 0
                        });
                    });
                });
            }

            if (rawAggregatedMessages.length === 0) {
                container.innerHTML = `<div class="empty-state">No chat records detected over database feeds.</div>`;
                return;
            }

            // Arrange chronological timeline ordering (newest first)
            rawAggregatedMessages.sort((x, y) => y.timestamp - x.timestamp);

            // Output elements cleanly with image string support enabled
            rawAggregatedMessages.forEach(msg => {
                const formattedTime = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Just now';
                const avatarStyle = resolveAvatarStyle(msg.senderAvatar);

                const card = document.createElement('div');
                card.className = "chat-card";
                card.innerHTML = `
                    <div class="avatar-node" ${avatarStyle}></div>
                    <div class="chat-details">
                        <div class="chat-meta">
                            <span><strong>${msg.senderName}</strong> ➡️ <em>${msg.receiverName}</em></span>
                            <span class="chat-time">${formattedTime}</span>
                        </div>
                        <div class="chat-msg">${msg.text}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        });
    }

    // Switch View Layout Tabs Functional Context
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
                
        document.getElementById(tabId).classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');
    };

    document.getElementById('btn-approvals').onclick = () => window.switchTab('approvals');
    document.getElementById('btn-activity').onclick = () => window.switchTab('activity');
    document.getElementById('btn-chats').onclick = () => window.switchTab('chats');

    window.onload = () => {
        loadPendingUsers();
        listenToUserActivity();
        listenToRTDBChats();
    };
</script>
</body>
</html>

        onSnapshot(q, (snapshot) => {
            snapshot.forEach(uDoc => {
                const data = uDoc.data();
                cachedUserDirectory[uDoc.id] = data.customName || data.name || `@${data.username}`;
            });
        });
    }
    syncUserDirectory();

    // --- TAB 1: PENDING REGISTRATION APPROVALS ---
    async function loadPendingUsers() {
        const container = document.getElementById('userList');
        container.innerHTML = "";
        try {
            const q = query(collection(db, "accounts"), where("status", "==", "pending"));
            const snapshot = await getDocs(q);

            if (snapshot.empty) {
                container.innerHTML = `<div class="empty-state">No accounts requiring registration attention right now.</div>`;
                return;
            }

            snapshot.forEach((userDoc) => {
                const data = userDoc.data();
                const card = document.createElement('div');
                card.className = "user-card";
                card.innerHTML = `
                    <div class="user-info">
                        <div class="name">${data.name || data.customName}</div>
                        <div class="username">@${data.username}</div>
                    </div>
                    <button class="btn btn-approve btn-approve-reg" data-id="${userDoc.id}">APPROVE</button>
                `;
                container.appendChild(card);
            });

            document.querySelectorAll('.btn-approve-reg').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    await updateDoc(doc(db, "accounts", id), { status: "approved" });
                    loadPendingUsers();
                });
            });
        } catch (err) {
            container.innerHTML = `<div class="empty-state" style="color:var(--danger)">Error loading profiles.</div>`;
        }
    }

    // --- TAB 2: ACCOUNT PROFILE UPDATE DATA MODIFICATIONS REQUESTS ---
    function listenToUpdateRequests() {
        const container = document.getElementById('updateRequestList');
        const q = query(collection(db, "update_requests"), where("status", "==", "pending"));

        onSnapshot(q, (snapshot) => {
            container.innerHTML = "";
            if (snapshot.empty) {
                container.innerHTML = `<div class="empty-state">No pending account changes or data adjustment requests.</div>`;
                return;
            }

            snapshot.forEach((reqDoc) => {
                const data = reqDoc.data();
                const card = document.createElement('div');
                card.className = "user-card";
                
                // Capitalize text strings gracefully
                const printableType = data.requestType.toUpperCase();

                card.innerHTML = `
                    <div class="user-info">
                        <div class="name">Account: ${cachedUserDirectory[data.accountId] || data.currentUsername}</div>
                        <div class="username">Current Username Handle: @${data.currentUsername}</div>
                        <div class="request-details">
                            <strong>REQUESTED CHANGE:</strong> New ${printableType} ➡️ <span style="color:var(--primary); font-weight:600;">${data.newValue}</span>
                        </div>
                    </div>
                    <div class="action-actions">
                        <button class="btn btn-approve btn-req-approve" data-reqid="${reqDoc.id}" data-accid="${data.accountId}" data-type="${data.requestType}" data-value="${data.newValue}">APPROVE</button>
                        <button class="btn btn-reject btn-req-reject" data-reqid="${reqDoc.id}">REJECT</button>
                    </div>
                `;
                container.appendChild(card);
            });

            // Bind Approval Logic Elements
            container.querySelectorAll('.btn-req-approve').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const reqId = e.target.getAttribute('data-reqid');
                    const accId = e.target.getAttribute('data-accid');
                    const fieldType = e.target.getAttribute('data-type');
                    const finalValue = e.target.getAttribute('data-value');

                    const updatePayload = {};
                    if (fieldType === 'name') updatePayload.name = finalValue;
                    if (fieldType === 'username') updatePayload.username = finalValue;
                    if (fieldType === 'password') updatePayload.password = finalValue;

                    try {
                        // Apply data patch directly inside Core User Document Account File reference
                        await updateDoc(doc(db, "accounts", accId), updatePayload);
                        // Safely remove structural queue ledger item
                        await deleteDoc(doc(db, "update_requests", reqId));
                    } catch (err) {
                        alert("Update error operation failed: " + err.message);
                    }
                });
            });

            // Bind Rejection Action Logic Elements
            container.querySelectorAll('.btn-req-reject').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const reqId = e.target.getAttribute('data-reqid');
                    try {
                        await deleteDoc(doc(db, "update_requests", reqId));
                    } catch (err) {
                        alert("Rejection cleanup operation failed: " + err.message);
                    }
                });
            });
        });
    }

    // --- TAB 3: ACTIVE STATUS & ACCESS CONTROL ---
    function listenToUserActivity() {
        const container = document.getElementById('activeUserList');
        const q = query(collection(db, "accounts"), where("status", "!=", "pending"));

        onSnapshot(q, (snapshot) => {
            container.innerHTML = "";
            if (snapshot.empty) {
                container.innerHTML = `<div class="empty-state">No verified accounts found.</div>`;
                return;
            }

            snapshot.forEach((userDoc) => {
                const data = userDoc.data();
                const isOnline = data.isOnline === true; 
                const isEsoaDisabled = data.esoaDisabled === true;

                const card = document.createElement('div');
                card.className = "user-card";
                card.innerHTML = `
                    <div class="user-info">
                        <div class="name">
                            ${data.customName || data.name} 
                            <span class="status-badge ${isOnline ? 'active' : 'offline'}">${isOnline ? 'ONLINE' : 'OFFLINE'}</span>
                        </div>
                        <div class="username">@${data.username} ${isEsoaDisabled ? '<span style="color:var(--danger); font-size:0.75rem;">(eSOA Disabled)</span>' : ''}</div>
                    </div>
                    <button class="btn ${isEsoaDisabled ? 'btn-enable' : 'btn-disable'}" data-id="${userDoc.id}" data-disabled="${isEsoaDisabled}">
                        ${isEsoaDisabled ? 'Enable eSOA' : 'Disable eSOA'}
                    </button>
                `;
                container.appendChild(card);
            });

            container.querySelectorAll('.btn-disable, .btn-enable').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = e.target.getAttribute('data-id');
                    const currentDisabledStatus = e.target.getAttribute('data-disabled') === 'true';
                    await updateDoc(doc(db, "accounts", id), { 
                        esoaDisabled: !currentDisabledStatus 
                    });
                });
            });
        });
    }

    // --- TAB 4: REALTIME DATABASE CHAT MONITOR ---
    function listenToRTDBChats() {
        const container = document.getElementById('chatLogsList');
        const sessionsRef = ref(rtdb);

        onValue(sessionsRef, (snapshot) => {
            container.innerHTML = "";
            const masterData = snapshot.val() || {};
            const rawAggregatedMessages = [];

            // 1. Gather Group Chat Data (Cleaned Label "GROUP CHAT")
            if (masterData.group_chat && masterData.group_chat.messages) {
                Object.keys(masterData.group_chat.messages).forEach(mId => {
                    const item = masterData.group_chat.messages[mId];
                    rawAggregatedMessages.push({
                        sender: item.senderName || cachedUserDirectory[item.sender] || item.sender || "Unknown",
                        receiver: "👥 GROUP CHAT",
                        text: item.text,
                        timestamp: item.timestamp || 0                    });
                });
            }

            // 2. Gather Private Sessions Data
            if (masterData.sessions) {
                Object.keys(masterData.sessions).forEach(sessionKey => {
                    const track = masterData.sessions[sessionKey];
                    Object.keys(track).forEach(mId => {
                        const item = track[mId];
                        if (!item.text) return; 

                        const impliedIds = sessionKey.split('_');
                        const parsedSenderName = cachedUserDirectory[item.sender] || item.sender || "User";
                        const destinationId = impliedIds.find(id => id !== item.sender) || "User Partner";
                        const parsedReceiverName = cachedUserDirectory[destinationId] || destinationId;

                        rawAggregatedMessages.push({
                            sender: parsedSenderName,
                            receiver: `👤 ${parsedReceiverName}`,
                            text: item.text,
                            timestamp: item.timestamp || 0
                        });
                    });
                });
            }

            if (rawAggregatedMessages.length === 0) {
                container.innerHTML = `<div class="empty-state">No chat records detected over database feeds.</div>`;
                return;
            }

            // Sort chronologically (newest at the top)
            rawAggregatedMessages.sort((x, y) => y.timestamp - x.timestamp);

            // Display records sequentially 
            rawAggregatedMessages.forEach(msg => {
                const formattedTime = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Just now';
                const card = document.createElement('div');
                card.className = "chat-card";
                card.innerHTML = `
                    <div class="chat-meta">
                        <span><strong>${msg.sender}</strong> ➡️ <em>${msg.receiver}</em></span>
                        <span class="chat-time">${formattedTime}</span>
                    </div>
                    <div class="chat-msg">${msg.text}</div>
                `;
                container.appendChild(card);
            });
        });
    }

    // Tab Navigation Logic Layout
    window.switchTab = function(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');
    };

    document.getElementById('btn-approvals').onclick = () => window.switchTab('approvals');
    document.getElementById('btn-updates').onclick = () => window.switchTab('updates');
    document.getElementById('btn-activity').onclick = () => window.switchTab('activity');
    document.getElementById('btn-chats').onclick = () => window.switchTab('chats');

    // Initialize sequences
    window.onload = () => {
        loadPendingUsers();
        listenToUpdateRequests();
        listenToUserActivity();
        listenToRTDBChats();
    };
</script>
</body></html>
