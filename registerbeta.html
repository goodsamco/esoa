<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSOA - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: #161e2d;
            --primary: #38bdf8;
            --text-main: #f1f5f9;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 380px;
            background: var(--surface);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        h2 {
            font-size: 1.1rem;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            font-weight: 800;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
            position: relative;
        }
        .input-group label {
            font-size: 0.72rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
            margin-left: 2px;
            display: block;
            margin-bottom: 8px;
        }
        input {
            width: 100%;
            background: #0b0f1a;
            border: 1px solid #334155;
            padding: 14px;
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.15);
        }
        .username-status {
            position: absolute;
            right: 14px;
            top: 38px;
            display: flex;
            align-items: center;
        }
        .status-icon {
            width: 18px;
            height: 18px;
            display: none;
        }
        .status-icon.success {
            color: #10b981;
        }
        .status-icon.error {
            color: #ef4444;
        }
        .status-icon.loading {
            color: var(--primary);
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: #0b0f1a;
            border: none;
            padding: 15px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(56, 189, 248, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(56, 189, 248, 0.3);
        }
        .msg {
            margin-top: 20px;
            font-size: 0.85rem;
            min-height: 20px;
            font-weight: 600;
        }
        .login-link {
            display: block;
            margin-top: 20px;
            color: #64748b;
            font-size: 0.85rem;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }
        .login-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>CREATE ACCOUNT</h2>
    <form id="regForm">
        <div class="input-group">
            <label>FULL NAME</label>
            <input type="text" id="regName" required>
        </div>
        <div class="input-group">
            <label>USERNAME</label>
            <input type="text" id="regUser" required autocomplete="username">
            <div class="username-status">
                <i data-lucide="loader-2" class="status-icon loading" id="iconLoading"></i>
                <i data-lucide="check-circle-2" class="status-icon success" id="iconSuccess"></i>
                <i data-lucide="alert-circle" class="status-icon error" id="iconError"></i>
            </div>
        </div>
        <div class="input-group">
            <label>PASSWORD</label>
            <input type="password" id="regPass" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn-submit">REGISTER</button>
    </form>
    <div class="msg" id="regMsg"></div>
    <a href="login.html" class="login-link">Already have an account? Log in</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDaeNQF4qmW0vvwxUPp_NztnT0hoLzm1BQ",
        authDomain: "svls-289ee.firebaseapp.com",
        databaseURL: "https://svls-289ee-default-rtdb.firebaseio.com",
        projectId: "svls-289ee",
        storageBucket: "svls-289ee.firebasestorage.app",
        messagingSenderId: "500705386198",
        appId: "1:500705386198:web:96f189662bc2aa99cf7377",
        measurementId: "G-5TNBMQ2HN5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    lucide.createIcons();

    const regUser = document.getElementById('regUser');
    const regPass = document.getElementById('regPass');
    const iconLoading = document.getElementById('iconLoading');
    const iconSuccess = document.getElementById('iconSuccess');
    const iconError = document.getElementById('iconError');

    let isUsernameValid = false;
    let debounceTimer = null;

    const accountsRef = collection(db, "accounts");

    function clearIcons() {
        iconLoading.style.display = 'none';
        iconSuccess.style.display = 'none';
        iconError.style.display = 'none';
    }

    async function checkUsernameAvailability(username) {
        if (!username) {
            clearIcons();
            isUsernameValid = false;
            return;
        }

        clearIcons();
        iconLoading.style.display = 'block';

        try {
            const q = query(accountsRef, where("username", "==", username));
            const querySnap = await getDocs(q);

            clearIcons();
            if (querySnap.empty) {
                iconSuccess.style.display = 'block';
                isUsernameValid = true;
            } else {
                iconError.style.display = 'block';
                isUsernameValid = false;
            }
        } catch (err) {
            console.error("Availability validation tracking fault:", err);
            clearIcons();
            isUsernameValid = false;
        }
    }

    regUser.addEventListener('input', (e) => {
        const username = e.target.value.trim().toLowerCase();
        
        if (!username) {
            clearIcons();
            isUsernameValid = false;
            return;
        }

        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            checkUsernameAvailability(username);
        }, 500);
    });

    document.getElementById('regForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('regName').value.trim();
        const username = regUser.value.trim().toLowerCase();
        const password = regPass.value;
        const msg = document.getElementById('regMsg');

        if (!isUsernameValid) {
            msg.style.color = "#ef4444";
            msg.innerText = "Please resolve username availability before continuing.";
            return;
        }

        try {
            const allSnap = await getDocs(accountsRef);
            const isFirst = allSnap.empty;

            const targetRole = isFirst ? "admin" : "user";
            const targetStatus = isFirst ? "approved" : "pending";

            const generatedEmail = `${username}@svls-internal.local`;

            await createUserWithEmailAndPassword(auth, generatedEmail, password);

            await addDoc(accountsRef, {
                name: name,
                username: username,
                email: generatedEmail,
                role: targetRole,
                status: targetStatus
            });

            msg.style.color = "#ffee00";
            msg.innerText = isFirst ? "Admin registered! Redirecting..." : "Registration submitted! Awaiting admin approval.";
            setTimeout(() => window.location.href = "login.html", 2500);

        } catch (err) {
            msg.style.color = "#ef4444";
            if (err.code === "auth/weak-password") {
                msg.innerText = "Password structural vulnerability: Should be at least 6 characters.";
            } else if (err.code === "auth/email-already-in-use") {
                msg.innerText = "The requested username profile identity is already taken.";
            } else {
                msg.innerText = "Error: " + err.message;
            }
        }
    });
</script>
</body>
</html>
