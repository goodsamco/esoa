<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSOA — Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --surface: rgba(255, 255, 255, 0.03);
            --primary: #38bdf8;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.06);
            --border-glass: rgba(255, 255, 255, 0.1);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }

        body {
            font-family: 'Plus Jakarta Sans', 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 30px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        .dashboard-header {
            max-width: 1400px;
            margin: 0 auto 30px auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-header h1 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .dashboard-header h1 span {
            color: var(--primary);
        }

        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 1024px) {
            .grid-layout { grid-template-columns: 1fr; }
        }

        .panel-card {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            height: 600px;
            box-sizing: border-box;
        }

        .panel-card h2 {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 15px;
            color: var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .scrollable-area {
            flex-grow: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        /* Lists & Request Cards Styles */
        .request-item, .user-row-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 15px;
            transition: all 0.2s ease;
        }

        .request-item:hover, .user-row-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .badge {
            font-size: 0.65rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 20px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .badge-reg { background: rgba(56, 189, 248, 0.15); color: var(--primary); }
        .badge-mod { background: rgba(245, 158, 11, 0.15); color: var(--warning); }

        .meta-title { font-weight: 600; font-size: 0.95rem; color: var(--text-main); }
        .meta-sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
        
        .value-comparison {
            background: rgba(0,0,0,0.2);
            padding: 8px 12px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 0.82rem;
            font-family: monospace;
        }

        .action-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        /* Buttons Core UI Framework */
        .btn {
            border: none;
            padding: 10px 16px;
            font-size: 0.75rem;
            font-weight: 800;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
        }

        .btn-approve { background: var(--success); color: #000; }
        .btn-reject { background: var(--danger); color: #fff; }
        .btn-sync { background: var(--primary); color: #000; display: inline-flex; align-items: center; gap: 6px; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* Integrated Chat Visual Framework */
        .chat-window {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-feed {
            flex-grow: 1;
            overflow-y: auto;
            background: rgba(0,0,0,0.15);
            border: 1px solid var(--border-glass);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-msg {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 0.88rem;
            line-height: 1.4;
            position: relative;
        }

        .chat-msg.incoming {
            background: rgba(255,255,255,0.05);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .chat-msg.outgoing {
            background: var(--primary);
            color: #000;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            font-weight: 600;
        }

        .chat-msg .author {
            font-size: 0.68rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .chat-msg.outgoing .author {
            color: rgba(0,0,0,0.6);
        }

        .chat-msg .time {
            font-size: 0.6rem;
            opacity: 0.6;
            text-align: right;
            margin-top: 4px;
        }

        .chat-input-form {
            display: flex;
            gap: 10px;
        }

        .chat-input-form input {
            flex-grow: 1;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border-glass);
            padding: 14px;
            border-radius: 30px;
            color: #fff;
            outline: none;
            font-size: 0.9rem;
        }

        .chat-input-form input:focus {
            border-color: var(--primary);
        }

        /* User Grid Operations Row Layout */
        .user-meta-wrapper {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .user-identity {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar-indicator {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--border-glass);
            background-color: rgba(255,255,255,0.1);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <header class="dashboard-header">
        <h1>eSOA <span>// System Control Engine</span></h1>
        <button class="btn btn-reject" id="btnLogOut">LOG OUT</button>
    </header>

    <main class="grid-layout">
        
        <section class="panel-card">
            <h2>Approval Queue <span id="countApprovals" class="badge badge-reg">0 Pending</span></h2>
            <div class="scrollable-area" id="approvalsContainer">
                </div>
        </section>

        <section class="panel-card">
            <h2>Active Registrants Directory</h2>
            <div class="scrollable-area" id="usersContainer">
                </div>
        </section>

        <section class="panel-card" style="grid-column: 1 / -1; height: 500px;">
            <h2>Group Chat</h2>
            <div class="chat-window">
                <div class="chat-feed" id="chatFeedBox">
                    </div>
                <form class="chat-input-form" id="chatInputForm">
                    <input type="text" id="chatField" placeholder="Broadcast master admin message to group matrix..." required autocomplete="off">
                    <button type="submit" class="btn btn-sync">Send</button>
                </form>
            </div>
        </section>

    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { 
        getFirestore, collection, getDocs, doc, query, where, 
        addDoc, updateDoc, deleteDoc, onSnapshot, orderBy, limit, serverTimestamp 
    } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDaeNQF4qmW0vvwxUPp_NztnT0hoLzm1BQ",
        authDomain: "svls-289ee.firebaseapp.com",
        databaseURL: "https://svls-289ee-default-rtdb.firebaseio.com",
        projectId: "svls-289ee",
        storageBucket: "svls-289ee.firebasestorage.app",
        messagingSenderId: "500705386198",
        appId: "1:500705386198:web:96f189662bc2aa99cf7377",
        measurementId: "G-5TNBMQ2HN5"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Secure Gate verification routine
    const currentRole = localStorage.getItem("userRole");
    if (currentRole !== "admin") {
        window.location.href = "login.html";
    }

    document.getElementById('btnLogOut').addEventListener('click', () => {
        localStorage.clear();
        window.location.href = "login.html";
    });

    // Unified Approvals State Tracker Engine
    function startRealtimeApprovalsEcosystem() {
        const container = document.getElementById('approvalsContainer');
        
        let pendingRegList = [];
        let pendingUpdateList = [];

        // Track Registrations (accounts document with code: status == pending)
        const qReg = query(collection(db, "accounts"), where("status", "==", "pending"));
        onSnapshot(qReg, (snap) => {
            pendingRegList = snap.docs.map(doc => ({ id: doc.id, type: 'registration', ...doc.data() }));
            renderCombinedApprovals(pendingRegList, pendingUpdateList);
        });

        // Track Modifications Ledger
        const qUpdate = query(collection(db, "update_requests"), where("status", "==", "pending"));
        onSnapshot(qUpdate, (snap) => {
            pendingUpdateList = snap.docs.map(doc => ({ id: doc.id, type: 'update', ...doc.data() }));
            renderCombinedApprovals(pendingRegList, pendingUpdateList);
        });
    }

    function renderCombinedApprovals(regArray, updateArray) {
        const target = document.getElementById('approvalsContainer');
        const countBadge = document.getElementById('countApprovals');
        target.innerHTML = '';
        
        const combined = [...regArray, ...updateArray];
        countBadge.innerText = `${combined.length} Actionable`;

        if(combined.length === 0) {
            target.innerHTML = `<div style="color:var(--text-muted); text-align:center; padding-top:40px; font-size:0.9rem;">Queue clear. No pending items found.</div>`;
            return;
        }

        combined.forEach(item => {
            const card = document.createElement('div');
            card.className = 'request-item';

            if(item.type === 'registration') {
                card.innerHTML = `
                    <div class="item-header">
                        <span class="badge badge-reg">New Registration</span>
                        <div style="font-size:0.75rem; color:var(--text-muted);">ID: ${item.id.substring(0,6)}...</div>
                    </div>
                    <div class="meta-title">${item.name || 'Anonymous User'}</div>
                    <div class="meta-sub">Requested Username: <strong>${item.username}</strong></div>
                    <div class="action-container">
                        <button class="btn btn-approve" onclick="resolveRegistration('${item.id}', true)">Accept Access</button>
                        <button class="btn btn-reject" onclick="resolveRegistration('${item.id}', false)">Deny</button>
                    </div>
                `;
            } else {
                card.innerHTML = `
                    <div class="item-header">
                        <span class="badge badge-mod">Modification Request</span>
                        <div style="font-size:0.75rem; color:var(--text-muted);">Req ID: ${item.id.substring(0,6)}...</div>
                    </div>
                    <div class="meta-title">Account Holder: @${item.currentUsername}</div>
                    <div class="meta-sub">Adjustment Mode: <span style="color:var(--warning); font-weight:600;">${item.requestType.toUpperCase()}</span></div>
                    <div class="value-comparison">Proposed Input: "${item.newValue}"</div>
                    <div class="action-container">
                        <button class="btn btn-approve" onclick="resolveDataModification('${item.id}', '${item.accountId}', '${item.requestType}', '${item.newValue}', true)">Commit Change</button>
                        <button class="btn btn-reject" onclick="resolveDataModification('${item.id}', null, null, null, false)">Discard</button>
                    </div>
                `;
            }
            target.appendChild(card);
        });
    }

    // Core Global Scope Resolution Handlers for Event Attributes injection
    window.resolveRegistration = async (docId, approved) => {
        try {
            if(approved) {
                await updateDoc(doc(db, "accounts", docId), { status: "approved" });
            } else {
                await deleteDoc(doc(db, "accounts", docId));
            }
        } catch(e) { console.error("Error setting access level:", e); }
    };

    window.resolveDataModification = async (requestId, accountId, type, newValue, approved) => {
        try {
            if(approved) {
                const userRef = doc(db, "accounts", accountId);
                if(type === 'password') await updateDoc(userRef, { password: newValue });
                if(type === 'name') await updateDoc(userRef, { name: newValue });
                if(type === 'username') await updateDoc(userRef, { username: newValue });
                
                await updateDoc(doc(db, "update_requests", requestId), { status: "approved" });
            } else {
                await updateDoc(doc(db, "update_requests", requestId), { status: "rejected" });
            }
        } catch(e) { console.error("Error setting verification modification:", e); }
    };

    // User Directory Realtime Thread + Remote Sync Trigger Hook
    function startUsersSyncEngine() {
        const target = document.getElementById('usersContainer');
        const q = query(collection(db, "accounts"), orderBy("username", "asc"));
        
        onSnapshot(q, (snap) => {
            target.innerHTML = '';
            snap.forEach(docSnap => {
                const data = docSnap.data();
                if(data.role === 'admin') return; // Skip administration nodes
                
                const card = document.createElement('div');
                card.className = 'user-row-card';
                
                const fallbackAvatar = 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=100';
                const avatar = data.profilePic || data.avatarUrl || fallbackAvatar;

                card.innerHTML = `
                    <div class="user-meta-wrapper">
                        <div class="user-identity">
                            <div class="user-avatar-indicator" style="background-image: url('${avatar}')"></div>
                            <div>
                                <div class="meta-title">${data.name || 'No Verified Name'}</div>
                                <div class="meta-sub">@${data.username} | Status: <span style="color:${data.status === 'approved' ? 'var(--success)' : 'var(--danger)'}">${data.status}</span></div>
                            </div>
                        </div>
                        <button class="btn btn-sync" onclick="dispatchSilentRefresh('${docSnap.id}')">
                            🔄 Silent Refresh
                        </button>
                    </div>
                `;
                target.appendChild(card);
            });
        });
    }

    // DISPATCH BACKGROUND REFRESH TARGET SIGNAL
    window.dispatchSilentRefresh = async (userId) => {
        try {
            const userRef = doc(db, "accounts", userId);
            await updateDoc(userRef, {
                refreshSignal: new Date().getTime() // Inject epoch timestamp trigger array element
            });
        } catch(e) {
            console.error("Failed to route remote device handshake execution path:", e);
        }
    };

// Fully Functional "Group Chat" System Monitoring Matrix
    function connectGroupChatFeed() {
        const feedBox = document.getElementById('chatFeedBox');
        const form = document.getElementById('chatInputForm');
        const input = document.getElementById('chatField');

        // Streams standard centralized platform messages
        const qChat = query(collection(db, "messages"), orderBy("timestamp", "asc"), limit(60));
        
        onSnapshot(qChat, (snap) => {
            feedBox.innerHTML = '';
            snap.forEach(msgDoc => {
                const item = msgDoc.data();
                const node = document.createElement('div');
                
                // Identify incoming vs administration generated messages
                const isAdminMsg = (item.role === 'admin' || item.name === 'Admin' || item.senderId === localStorage.getItem("userId"));
                node.className = `chat-msg ${isAdminMsg ? 'outgoing' : 'incoming'}`;
                
                const timeString = item.timestamp ? new Date(item.timestamp.toMillis()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Just now';

                node.innerHTML = `
                    <div class="author">${item.name || 'System User'}</div>
                    <div>${item.text || item.message || ''}</div>
                    <div class="time">${timeString}</div>
                `;
                feedBox.appendChild(node);
            });
            feedBox.scrollTop = feedBox.scrollHeight;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const textValue = input.value.trim();
            if(!textValue) return;

            try {
                await addDoc(collection(db, "messages"), {
                    senderId: localStorage.getItem("userId") || "system_admin",
                    name: localStorage.getItem("userName") || "Admin System",
                    role: "admin",
                    text: textValue,
                    timestamp: serverTimestamp()
                });
                input.value = '';
            } catch(err) {
                console.error("Chat dispatch structural network fault:", err);
            }
        });
    }

    // Master System Thread Activation
    startRealtimeApprovalsEcosystem();
    startUsersSyncEngine();
    connectGroupChatFeed();
</script>
</body>
</html>
